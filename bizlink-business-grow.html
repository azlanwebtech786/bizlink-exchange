<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bizlink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">

<nav class="flex justify-between p-4 bg-gray-900">
  <h1 class="text-xl font-bold text-blue-500">Bizlink</h1>
  <a href="add-business-grow.html">
    <button class="bg-blue-600 px-4 py-2 rounded">Add Business</button>
  </a>
</nav>

<section class="p-6">
  <h2 class="text-2xl mb-4">All Categories</h2>
  <div id="categories" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>
</section>

<section class="p-6">
  <h2 class="text-2xl mb-4">Businesses</h2>
  <div id="list" class="grid md:grid-cols-3 gap-4"></div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDruI4mHLRb-KKNnThDn7Woaj28Kg0THwE",
  authDomain: "biz-link9610.firebaseapp.com",
  projectId: "biz-link9610",
  storageBucket: "biz-link9610.firebasestorage.app",
  messagingSenderId: "256899172885",
  appId: "1:256899172885:web:69d634f42675be0ae0dc1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const catBox = document.getElementById("categories");
const list = document.getElementById("list");

let all = [];

// FETCH BUSINESSES
const snap = await getDocs(collection(db,"businesses"));
snap.forEach(doc=> all.push(doc.data()));

// RENDER
function render(data){
  list.innerHTML="";
  data.forEach(b=>{
    list.innerHTML+=`
      <div class="bg-gray-800 p-4 rounded">
        <img src="${b.image || 'https://via.placeholder.com/300'}" class="w-full h-32 object-cover">
        <h3 class="text-lg mt-2">${b.name}</h3>
        <p>${b.location}</p>
        <a href="https://wa.me/91${b.whatsapp}" target="_blank">WhatsApp</a>
      </div>
    `;
  });
}

render(all);

// FETCH CATEGORIES
let cats = new Set();
all.forEach(b=> cats.add(b.category));

cats.forEach(cat=>{
  catBox.innerHTML+=`
    <div onclick="filter('${cat}')" class="bg-gray-700 p-2 rounded text-center cursor-pointer">
      ${cat}
    </div>
  `;
});

// FILTER
window.filter = (c)=>{
  render(all.filter(b=>b.category===c));
};
</script>

</body>
</html>
