<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bizlink - Grow Your Business</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans">

  <!-- Navbar -->
  <nav class="flex justify-between items-center p-4 bg-gray-900 shadow-lg">
    <h1 class="text-2xl font-bold text-blue-500">Bizlink</h1>
    <div class="space-x-4">
      <a href="add-business.html">
        <button class="bg-blue-600 px-4 py-2 rounded-xl hover:bg-blue-700">List Business</button>
      </a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="text-center py-16 px-4">
    <h2 class="text-4xl font-bold mb-4">Grow Your Business with Bizlink 🚀</h2>
    <p class="text-gray-400 mb-6">Get customers, leads & Google visibility</p>

    <div class="flex justify-center">
      <input type="text" placeholder="Search business..." class="w-full max-w-xl px-4 py-3 rounded-l-xl text-black">
      <button class="bg-blue-600 px-6 py-3 rounded-r-xl">Search</button>
    </div>
  </section>

  <!-- Categories -->
  <section class="px-6 py-10">
    <h3 class="text-2xl font-semibold mb-6">All Categories</h3>
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
      <div class="bg-gray-800 p-4 rounded-xl text-center">Coaching</div>
      <div class="bg-gray-800 p-4 rounded-xl text-center">Salon</div>
      <div class="bg-gray-800 p-4 rounded-xl text-center">Restaurant</div>
      <div class="bg-gray-800 p-4 rounded-xl text-center">Repair</div>
      <div class="bg-gray-800 p-4 rounded-xl text-center">Real Estate</div>
      <div class="bg-gray-800 p-4 rounded-xl text-center">Gym</div>
    </div>
  </section>

  <!-- 🔥 Dynamic Business Section -->
  <section class="px-6 py-10">
    <h3 class="text-2xl font-semibold mb-6">Live Businesses</h3>

    <!-- IMPORTANT: ID ADD -->
    <div id="business-list" class="grid md:grid-cols-3 gap-6"></div>
  </section>

  <!-- Firebase Script -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDruI4mHLRb-KKNnThDn7Woaj28Kg0THwE",
      authDomain: "biz-link9610.firebaseapp.com",
      projectId: "biz-link9610",
      storageBucket: "biz-link9610.firebasestorage.app",
      messagingSenderId: "256899172885",
      appId: "1:256899172885:web:69d634f42675be0ae0dc1c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const container = document.getElementById("business-list");

    // 🔥 FETCH DATA
    const querySnapshot = await getDocs(collection(db, "businesses"));

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      container.innerHTML += `
        <div class="bg-gray-800 rounded-xl overflow-hidden shadow-lg hover:scale-105 transition">
          <img src="${data.image}" class="w-full h-40 object-cover">
          <div class="p-4">
            <h4 class="text-xl font-bold">${data.name}</h4>
            <p class="text-gray-400">${data.location}</p>

            <a href="https://wa.me/91${data.whatsapp}" target="_blank">
              <button class="mt-3 bg-green-500 px-4 py-2 rounded">WhatsApp</button>
            </a>

            <a href="tel:${data.phone}">
              <button class="mt-3 bg-blue-500 px-4 py-2 rounded ml-2">Call</button>
            </a>
          </div>
        </div>
      `;
    });

  </script>

</body>
</html>
