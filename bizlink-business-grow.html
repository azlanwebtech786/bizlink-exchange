<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bizlink Ecosystem</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- NAVBAR -->
<div class="flex justify-between items-center px-6 py-4 bg-white shadow">
  <h1 class="text-2xl font-bold text-blue-600">Bizlink</h1>

  <a href="add-business-grow.html">
    <button class="bg-blue-600 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-700">
      List Business
    </button>
  </a>
</div>

<!-- HERO -->
<div class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-10 text-center">
  <h2 class="text-4xl font-bold mb-2">Grow Your Business 🚀</h2>
  <p class="mb-6">Get customers, leads & Google visibility</p>

  <div class="flex justify-center max-w-xl mx-auto">
    <input id="searchInput" placeholder="Search business..."
      class="w-full p-3 rounded-l text-black">

    <button onclick="searchBusiness()"
      class="bg-yellow-400 px-6 rounded-r font-bold">
      Search
    </button>
  </div>
</div>

<!-- CATEGORY -->
<div class="p-6">
  <h2 class="text-xl font-bold mb-4">Popular Categories</h2>
  <div id="categories" class="grid grid-cols-3 md:grid-cols-6 gap-4"></div>
</div>

<!-- BUSINESS -->
<div class="p-6">
  <h2 class="text-xl font-bold mb-4">Businesses</h2>
  <div id="list" class="grid md:grid-cols-3 gap-6"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcSrWFZGputQMjk-gGsCcEzFpBPiOmBcI",
  authDomain: "bizlink-new.firebaseapp.com",
  projectId: "bizlink-new"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const catBox = document.getElementById("categories");

let all = [];

let categories = [
  "All","Salon","Coaching","Restaurant","Gym","Hospital","Hotel",
  "Electrician","Plumber","Car Service","Mobile Shop",
  "Real Estate","Repair","Boutique","Medical Store",
  "Bakery","Cafe","Photography","Event Planner",
  "Interior Designer","Travel Agency"
];

// FETCH
const snap = await getDocs(collection(db,"businesses"));

snap.forEach((doc)=>{
  const data = doc.data();
  data.id = doc.id; // 🔥 IMPORTANT

  all.push(data);

  if(data.category && !categories.includes(data.category)){
    categories.push(data.category);
  }
});

// CATEGORY RENDER
categories.forEach(cat=>{
  catBox.innerHTML += `
    <div onclick="filterCategory('${cat}')"
      class="bg-white shadow rounded-xl p-3 text-center cursor-pointer hover:bg-blue-100 hover:scale-105 transition">
      ${cat}
    </div>
  `;
});

// BUSINESS RENDER
function render(data){
  list.innerHTML = "";

  if(data.length === 0){
    list.innerHTML = `<p>No business found</p>`;
    return;
  }

  data.forEach(b=>{
    list.innerHTML += `
      <div onclick="openDetail('${b.id}')"
        class="bg-white shadow rounded-xl overflow-hidden cursor-pointer hover:scale-105 transition">

        <img src="${b.image || 'https://via.placeholder.com/400'}"
          class="w-full h-40 object-cover">

        <div class="p-4">
          <h3 class="font-bold text-lg">${b.name}</h3>
          <p class="text-gray-500 text-sm">${b.location}</p>
          <p class="text-xs text-blue-500">${b.category}</p>
        </div>

      </div>
    `;
  });
}

render(all);

// FILTER
window.filterCategory = (cat)=>{
  if(cat === "All"){
    render(all);
  } else {
    render(all.filter(b => b.category === cat));
  }
};

// SEARCH
window.searchBusiness = ()=>{
  const val = document.getElementById("searchInput").value.toLowerCase();

  render(all.filter(b =>
    (b.name && b.name.toLowerCase().includes(val)) ||
    (b.category && b.category.toLowerCase().includes(val)) ||
    (b.location && b.location.toLowerCase().includes(val))
  ));
};

// OPEN DETAIL
window.openDetail = (id)=>{
  window.location.href = "business-detail.html?id=" + id;
};

</script>

</body>
</html>
