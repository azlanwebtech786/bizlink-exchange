<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Auto Meta Ads – PRO AI SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#020617;color:#fff;text-align:center;}
.navbar{padding:20px;border-bottom:1px solid #1f2933;}
.logo{color:#22c55e;font-weight:bold;font-size:20px;}
.hero{padding:80px 20px;}
h1 span{color:#22c55e;}
.form-box{margin-top:30px;}
select,input{padding:10px;margin:10px;border-radius:6px;border:none;width:220px;}
.cta{margin-top:20px;background:#22c55e;color:#000;padding:15px 30px;border-radius:10px;font-weight:bold;cursor:pointer;display:inline-block;}
#result{margin:40px auto;max-width:500px;padding:20px;border:1px solid #22c55e;border-radius:10px;display:none;}
.error{color:red;margin-top:10px;}
#posterResult img{width:260px;border-radius:12px;margin-top:15px;}
.box{max-width:500px;margin:auto;background:#111;padding:15px;border-radius:10px;margin-top:20px;text-align:left;}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">AutoMetaAds PRO</div>
</div>

<section class="hero">

<h1>🔥 AI Powered <span>Ads Creator</span></h1>

<div class="form-box">

<select id="business">
<option value="restaurant">Restaurant</option>
<option value="school">School</option>
<option value="service">Service</option>
</select>

<input type="text" id="location" placeholder="Enter City" />

</div>

<div class="cta" onclick="generatePoster()">🎨 Generate AI Posters</div>
<div class="cta" onclick="generateInstaAd()">🔥 Instagram Ad</div>

<div id="posterResult"></div>

</section>

<script>

// 🔥 HEADLINES ENGINE
function getHeadlines(business,location){

if(business==="restaurant"){
return [
`Hungry in ${location}? 🍔`,
`Best Food in ${location} 😍`,
`Taste You’ll Love 🔥`,
`Order Delicious Food Today`,
`Craving Something Tasty?`
];
}

if(business==="school"){
return [
`Best School in ${location}`,
`Admissions Open Now 🎓`,
`Secure Your Child Future`,
`Top Education Near You`,
`Limited Seats Available`
];
}

return [
`Best Service in ${location}`,
`Trusted by Hundreds`,
`Fast & Reliable Service`,
`Your Problem Our Solution`,
`Contact Today 🚀`
];

}

// 🔥 POSTER SYSTEM
function generatePoster(){

const container=document.getElementById("posterResult");
container.innerHTML="";

const business=document.getElementById("business").value;
const location=document.getElementById("location").value;

const headlines=getHeadlines(business,location);

headlines.forEach(headline=>{

let bgUrl=`https://source.unsplash.com/1080x1080/?${business},${location},${Math.random()}`;

const canvas=document.createElement("canvas");
canvas.width=1080;
canvas.height=1080;
const ctx=canvas.getContext("2d");

const img=new Image();
img.crossOrigin="anonymous";
img.src=bgUrl;

img.onload=function(){

ctx.drawImage(img,0,0,1080,1080);

// overlay
ctx.fillStyle="rgba(0,0,0,0.65)";
ctx.fillRect(0,0,1080,1080);

ctx.textAlign="center";

// brand
ctx.fillStyle="#22c55e";
ctx.font="bold 50px Arial";
ctx.fillText("AutoMetaAds",540,120);

// headline
ctx.fillStyle="#fff";
ctx.font="bold 90px Arial";

wrapText(ctx,headline,540,450,800,100);

// CTA
ctx.fillStyle="#22c55e";
ctx.fillRect(300,750,480,110);

ctx.fillStyle="#000";
ctx.font="bold 45px Arial";
ctx.fillText("Contact Now 🚀",540,820);

const imgData=canvas.toDataURL();

container.innerHTML+=`
<img src="${imgData}">
<br>
<a href="${imgData}" download="poster.png" class="cta">Download</a>
`;

};

});

}

// 🔥 TEXT WRAP
function wrapText(ctx,text,x,y,maxWidth,lineHeight){
const words=text.split(" ");
let line="";
for(let n=0;n<words.length;n++){
let testLine=line+words[n]+" ";
let width=ctx.measureText(testLine).width;
if(width>maxWidth && n>0){
ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;
}else{
line=testLine;
}
}
ctx.fillText(line,x,y);
}

// 🔥 INSTAGRAM AI
function generateInstaAd(){

const container=document.getElementById("posterResult");
container.innerHTML="⏳ Generating...";

const business=document.getElementById("business").value;
const location=document.getElementById("location").value;

let headline=`Best ${business} in ${location}`;

const caption=`🔥 ${headline}

आज ही try करें!
📍 ${location}
📲 Message Now`;

const hashtags=`#${location} #${business} #localbusiness #ads #marketing #growth #viral`;

container.innerHTML=`
<div class="box">
<h3>📢 Caption</h3>
<p>${caption.replace(/\n/g,"<br>")}</p>

<h3>🔥 Hashtags</h3>
<p>${hashtags}</p>
</div>
`;

}

</script>

</body>
</html>
