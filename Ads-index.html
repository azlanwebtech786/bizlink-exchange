<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Meta Ads – Beginner to Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #020617;
      color: #ffffff;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 8%;
      border-bottom: 1px solid #1f2933;
    }

    .logo {
      color: #22c55e;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .hero h1 span {
      color: #22c55e;
    }

    .cta {
      display: inline-block;
      margin-top: 30px;
      background: #22c55e;
      color: #000;
      padding: 15px 30px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin: 40px auto;
      max-width: 500px;
      padding: 20px;
      border: 1px solid #22c55e;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">AutoMetaAds</div>
  </div>

  <section class="hero">
    <h1>
      Beginners के लिए  
      <span>Pro Level Meta Ads</span><br />
      अब 1 Click में
    </h1>

    <p>
      Ads सीखने की जरूरत नहीं ❌<br />
      Agency की जरूरत नहीं ❌<br />
      बस click करो और result देखो ✅
    </p>

    <!-- 🔥 BUTTON -->
    <div class="cta" onclick="getStrategy()">
      🚀 Generate Ads Strategy
    </div>

    <!-- 🔥 RESULT -->
    <div id="result"></div>
  </section>

  <script>
    async function getStrategy() {
      try {
        const res = await fetch("http://localhost:5000/ads/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            business: "restaurant",
            goal: "whatsapp",
            budget: 500
          })
        });

        const data = await res.json();

        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerHTML = `
          <h2>🔥 Strategy Result</h2>
          <p><b>Campaign:</b> ${data.campaign}</p>
          <p><b>Audience:</b> ${data.audience}</p>
          <p><b>Creative:</b> ${data.creative}</p>
          <p><b>Timing:</b> ${data.timing}</p>
          <p><b>Setup:</b> ${data.setup}</p>
        `;
      } catch (err) {
        alert("Error connecting backend 😢");
        console.error(err);
      }
    }
  </script>

</body>
</html>
