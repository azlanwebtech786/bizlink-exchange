<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoMetaAds PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#020617;color:#fff;text-align:center;}
.navbar{padding:20px;border-bottom:1px solid #1f2933;}
.logo{color:#22c55e;font-weight:bold;font-size:22px;}
.hero{padding:60px 20px;}

input,select{
padding:10px;margin:10px;
border-radius:6px;border:none;width:220px;
}

.cta{
background:#22c55e;color:#000;
padding:15px 30px;border-radius:10px;
font-weight:bold;cursor:pointer;margin:10px;
display:inline-block;
}

#posterResult img{
width:260px;border-radius:12px;margin-top:15px;
}

.box{
background:#111;
padding:15px;
border-radius:10px;
margin-top:20px;
max-width:500px;
margin:auto;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">AutoMetaAds PRO</div>
</div>

<section class="hero">

<h1>🔥 AI Ads Creator</h1>

<select id="business">
<option value="restaurant">Restaurant</option>
<option value="school">School</option>
<option value="service">Service</option>
<option value="salon">Salon</option>
<option value="clothing">Clothing</option>
<option value="gym">Gym</option>
</select>

<input type="text" id="location" placeholder="City">

<br>

<input type="text" id="bname" placeholder="Business Name">
<input type="text" id="offer" placeholder="Offer (50% OFF)">
<input type="text" id="phone" placeholder="Phone / WhatsApp">

<br>

<input type="file" id="logoInput">

<br>

<div class="cta" onclick="generatePoster()">🎨 Generate Posters</div>

<div id="posterResult"></div>

</section>

<script>

// LOGO
let logoImg=null;
document.getElementById("logoInput").addEventListener("change",function(e){
const reader=new FileReader();
reader.onload=function(event){
logoImg=new Image();
logoImg.src=event.target.result;
};
reader.readAsDataURL(e.target.files[0]);
});

// HEADLINE
function getHeadline(business,location,name){
const list=[
`🔥 ${name} – ${location} का No.1 ${business}`,
`😍 ${location} में सबसे trusted ${business}`,
`🚀 Premium ${business} experience`,
`💯 Best ${business} service near you`,
`⚡ Limited time ${business} offer`
];
return list[Math.floor(Math.random()*list.length)];
}

  function getPremiumHeadline(business, location, name){

if(business==="gym"){
return [
`🔥 ${location} का सबसे powerful gym`,
`💪 Transform your body in 30 days`,
`⚡ Join ${name} today`
];
}

if(business==="salon"){
return [
`✨ ${location} का No.1 salon`,
`😍 Look premium, feel confident`,
`💄 Book your makeover today`
];
}

if(business==="school"){
return [
`🎓 Best education in ${location}`,
`📚 Future starts here`,
`🚀 Admissions open now`
];
}

return [
`🔥 Best ${business} in ${location}`,
`💯 Trusted service near you`,
`🚀 Grow with ${name}`
];
}

// CAPTION
function generateCaption(business,location,name,offer){
return {
caption:`🔥 ${name} – Best ${business} in ${location}
${offer ? "🎁 "+offer : ""}
आज ही visit करें!
📍 ${location}
📲 Contact Now`,
hashtags:`#${name.replace(/\s/g,"")} #${location} #${business} #marketing #growth #ads`
};
}

// IMAGE LOADER
function loadImage(url){
return new Promise((res,rej)=>{
const img=new Image();
img.crossOrigin="anonymous";
img.onload=()=>res(img);
img.onerror=()=>rej();
img.src=url;
});
}

// MAIN FUNCTION
async function generatePoster(){

const container=document.getElementById("posterResult");
container.innerHTML="⏳ Generating...";

try{

const business=document.getElementById("business").value;
const location=document.getElementById("location").value || "india";
const name=document.getElementById("bname").value || "Your Business";
const offer=document.getElementById("offer").value;
const phone=document.getElementById("phone").value || "Contact Now";

container.innerHTML="";

// 🔥 DIRECT PREMIUM BACKGROUND (NO AI)
const bgMap = {
  restaurant: "https://images.unsplash.com/photo-1504674900247-0877df9cc836",
  gym: "https://images.unsplash.com/photo-1558611848-73f7eb4001a1",
  salon: "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9",
  school: "https://images.unsplash.com/photo-1588072432836-e10032774350",
  clothing: "https://images.unsplash.com/photo-1521335629791-ce4aec67dd53",
  service: "https://images.unsplash.com/photo-1556761175-4b46a572b786"
};

// 👉 2 posters
for(let i=0;i<2;i++){

let img;

try {

  const res = await fetch("http://localhost:5000/leonardo-image", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ business })
  });

  const data = await res.json();

  img = await loadImage(data.image);

} catch (err) {

  console.log("Leonardo fail → fallback");

  const fallback = "https://picsum.photos/1080";

  img = await loadImage(fallback);
}

const canvas=document.createElement("canvas");
canvas.width=1080;
canvas.height=1080;
const ctx=canvas.getContext("2d");

// 🔥 CINEMATIC BG
ctx.filter="brightness(0.7) contrast(1.1)";
ctx.drawImage(img,0,0,1080,1080);
ctx.filter="none";

// GRADIENT
let grad=ctx.createLinearGradient(0,0,0,1080);
grad.addColorStop(0,"rgba(0,0,0,0.2)");
grad.addColorStop(1,"rgba(0,0,0,0.85)");
ctx.fillStyle=grad;
ctx.fillRect(0,0,1080,1080);

ctx.textAlign="center";

// LOGO
if(logoImg) ctx.drawImage(logoImg,800,40,200,200);

// NAME
ctx.fillStyle="#22c55e";
ctx.font="bold 50px Arial";
ctx.fillText(name,540,120);

// HEADLINE
const headlines = getPremiumHeadline(business,location,name);
let headline = headlines[i % headlines.length];
ctx.fillStyle="#fff";
ctx.font="bold 80px Arial";
ctx.shadowColor="rgba(0,0,0,0.8)";
ctx.shadowBlur=20;
wrapText(ctx,headline,540,420,800,90);

// OFFER
if(offer){
ctx.beginPath();
ctx.roundRect(390,250,300,80,15);
ctx.fillStyle="#ff3b3b";
ctx.fill();

ctx.fillStyle="#fff";
ctx.font="bold 35px Arial";
ctx.fillText(offer,540,305);
}

// CTA BUTTON
ctx.shadowBlur=15;
ctx.beginPath();
ctx.roundRect(300,750,480,120,20);
ctx.fillStyle=i===0 ? "#22c55e" : "#ff3b3b";
ctx.fill();

ctx.fillStyle="#000";
ctx.font="bold 45px Arial";
ctx.fillText(phone,540,820);

// BRAND LINE
ctx.fillStyle="#aaa";
ctx.font="28px Arial";
ctx.fillText("Trusted by 1000+ Customers",540,900);

const imgData=canvas.toDataURL();

container.innerHTML+=`
<img src="${imgData}">
<br>
<a href="${imgData}" download="poster-${i}.png" class="cta">Download</a>
`;

}

// CAPTION
const ad=generateCaption(business,location,name,offer);

container.innerHTML+=`
<div class="box">
<h3>📢 Caption</h3>
<p>${ad.caption.replace(/\n/g,"<br>")}</p>

<h3>🔥 Hashtags</h3>
<p>${ad.hashtags}</p>
</div>
`;

}catch(err){
console.log(err);
container.innerHTML="❌ Error aaya";
}

}

// WRAP
function wrapText(ctx,text,x,y,maxWidth,lineHeight){
const words=text.split(" ");
let line="";
for(let n=0;n<words.length;n++){
let testLine=line+words[n]+" ";
if(ctx.measureText(testLine).width>maxWidth){
ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;
}else line=testLine;
}
ctx.fillText(line,x,y);
}

</script>

</body>
</html>
