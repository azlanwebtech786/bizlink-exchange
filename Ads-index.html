<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Auto Meta Ads – Beginner to Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#020617;color:#fff;text-align:center;}
.navbar{padding:20px;border-bottom:1px solid #1f2933;}
.logo{color:#22c55e;font-weight:bold;font-size:20px;}
.hero{padding:80px 20px;}
h1 span{color:#22c55e;}
.form-box{margin-top:30px;}
select,input{padding:10px;margin:10px;border-radius:6px;border:none;width:220px;}
.cta{margin-top:20px;background:#22c55e;color:#000;padding:15px 30px;border-radius:10px;font-weight:bold;cursor:pointer;display:inline-block;}
#result{margin:40px auto;max-width:500px;padding:20px;border:1px solid #22c55e;border-radius:10px;display:none;}
.error{color:red;margin-top:10px;}
#posterResult img{width:260px;border-radius:12px;margin-top:15px;}
#pdfContent{display:none;background:#fff;color:#000;padding:20px;}
.box{max-width:500px;margin:auto;background:#111;padding:15px;border-radius:10px;margin-top:20px;text-align:left;}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">AutoMetaAds</div>
</div>

<section class="hero">

<h1>Beginners के लिए <span>Pro Level Meta Ads</span><br>अब 1 Click में</h1>

<p>
Ads सीखने की जरूरत नहीं ❌<br>
Agency की जरूरत नहीं ❌<br>
बस details भरो और result देखो ✅
</p>

<div class="form-box">

<select id="business">
<option value="restaurant">Restaurant</option>
<option value="school">School</option>
<option value="service">Service</option>
</select>

<br>

<select id="goal">
<option value="whatsapp">WhatsApp</option>
<option value="leads">Leads</option>
</select>

<input type="text" id="location" placeholder="Enter City" />
<br>
<input type="number" id="budget" value="500" />

</div>

<div class="cta" onclick="getStrategy()">🚀 Generate Ads Strategy</div>

<div id="error" class="error"></div>
<div id="result"></div>

<button id="pdfBtn" onclick="downloadPDF()" class="cta" style="display:none;">
📄 Download PDF
</button>

<div class="cta" onclick="generatePoster()">🎨 Generate Posters</div>
<div class="cta" onclick="generateInstaAd()">🔥 Instagram Ad</div>

<div id="posterResult"></div>
<div id="pdfContent"></div>

</section>

<script>

// ===== STRATEGY =====
async function getStrategy(){

const business=document.getElementById("business").value;
const goal=document.getElementById("goal").value;
const budget=document.getElementById("budget").value;
const location=document.getElementById("location").value;

try{

const res=await fetch("http://localhost:5000/ads/generate",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ business,goal,budget,location })
});

const data=await res.json();

document.getElementById("result").style.display="block";
document.getElementById("pdfBtn").style.display="inline-block";

document.getElementById("result").innerHTML=`
<h2>🔥 Strategy Result</h2>

<p><b>Campaign:</b> ${data.campaign}</p>
<p><b>Audience:</b> ${data.audience}</p>
<p><b>Creative:</b> ${data.creative}</p>
<p><b>Timing:</b> ${data.timing}</p>
<p><b>Setup:</b> ${data.setup}</p>

<hr>

<h3>🔥 Headlines</h3>
${data.headlines.map(h=>`<p>• ${h}</p>`).join("")}

<h3>🔥 Primary Text</h3>
${data.texts.map(t=>`<p>• ${t}</p>`).join("")}

<h3>🔥 CTA</h3>
${data.ctas.map(c=>`<p>• ${c}</p>`).join("")}
`;

}catch(err){
document.getElementById("error").innerText="❌ Backend error";
}

}

// ===== PDF =====
function downloadPDF(){
const result=document.getElementById("result");
const pdf=document.getElementById("pdfContent");

pdf.innerHTML=result.innerHTML;
pdf.style.display="block";

setTimeout(()=>{
html2pdf().from(pdf).save();
pdf.style.display="none";
},500);
}

// ===== POSTER PRO =====
function generatePoster(){

const container=document.getElementById("posterResult");
container.innerHTML="";

const business=document.getElementById("business").value;
const location=document.getElementById("location").value;

let bgUrl="";

if(business==="restaurant"){
bgUrl="https://images.unsplash.com/photo-1504674900247-0877df9cc836";
}
else if(business==="school"){
bgUrl="https://images.unsplash.com/photo-1588072432836-e10032774350";
}
else{
bgUrl="https://images.unsplash.com/photo-1521791136064-7986c2920216";
}

const templates=["modern","bold","minimal"];

templates.forEach(template=>{

const canvas=document.createElement("canvas");
canvas.width=1080;
canvas.height=1080;
const ctx=canvas.getContext("2d");

const img=new Image();
img.crossOrigin="anonymous";
img.src=bgUrl;

img.onload=function(){

ctx.drawImage(img,0,0,1080,1080);

// overlay
ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,1080,1080);

let mainColor="#22c55e";
if(template==="bold") mainColor="#ff3b3b";
if(template==="minimal") mainColor="#ffffff";

ctx.textAlign="center";

// title
ctx.fillStyle=mainColor;
ctx.font="bold 60px Arial";
ctx.fillText("AutoMetaAds",540,120);

// headline
ctx.fillStyle="#fff";
ctx.font="bold 80px Arial";

let text=`Best ${business} in ${location}`;
wrapText(ctx,text,540,450,800,90);

// CTA
ctx.fillStyle=mainColor;
ctx.fillRect(300,750,480,110);

ctx.fillStyle="#000";
ctx.font="bold 45px Arial";
ctx.fillText("Contact Now 🚀",540,820);

const imgData=canvas.toDataURL();

container.innerHTML+=`
<img src="${imgData}">
<br>
<a href="${imgData}" download="poster.png" class="cta">Download</a>
`;
};

});

}

// ===== TEXT WRAP =====
function wrapText(ctx,text,x,y,maxWidth,lineHeight){
const words=text.split(" ");
let line="";
for(let n=0;n<words.length;n++){
let testLine=line+words[n]+" ";
let width=ctx.measureText(testLine).width;
if(width>maxWidth && n>0){
ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;
}else{
line=testLine;
}
}
ctx.fillText(line,x,y);
}

// ===== INSTAGRAM AI =====
function generateInstaAd(){

const container=document.getElementById("posterResult");
container.innerHTML="⏳ Generating...";

const business=document.getElementById("business").value;
const location=document.getElementById("location").value;

let headline=`Best ${business} in ${location}`;

const captions=[
`🔥 ${headline}\nआज ही try करें!\n📍 ${location}\n📲 Message Now`,
`🚀 ${headline}\nQuality service guaranteed 💯\n📍 ${location}\n📲 Contact Now`,
`😍 ${headline}\nLimited offer today!\n📍 ${location}\n📲 Book Now`
];

const caption=captions[Math.floor(Math.random()*captions.length)];

const hashtags=[
`#${location}`,
`#${business}`,
`#localbusiness`,
`#marketing`,
`#growth`,
`#ads`,
`#digitalmarketing`,
`#viral`,
`#india`,
`#business`
];

container.innerHTML=`
<div class="box">
<h3>📢 Caption</h3>
<p>${caption.replace(/\n/g,"<br>")}</p>

<h3>🔥 Hashtags</h3>
<p>${hashtags.join(" ")}</p>
</div>
`;

}
</script>

</body>
</html>
