<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Meta Ads – Beginner to Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #020617;
      color: #ffffff;
      text-align: center;
    }

    .navbar {
      padding: 20px;
      border-bottom: 1px solid #1f2933;
    }

    .logo {
      color: #22c55e;
      font-weight: bold;
      font-size: 20px;
    }

    .hero {
      padding: 80px 20px;
    }

    h1 span {
      color: #22c55e;
    }

    .form-box {
      margin-top: 30px;
    }

    select, input {
      padding: 10px;
      margin: 10px;
      border-radius: 6px;
      border: none;
      width: 200px;
    }

    .cta {
      margin-top: 20px;
      background: #22c55e;
      color: #000;
      padding: 15px 30px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
    }

    #result {
      margin: 40px auto;
      max-width: 500px;
      padding: 20px;
      border: 1px solid #22c55e;
      border-radius: 10px;
      display: none;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">AutoMetaAds</div>
  </div>

  <section class="hero">

    <h1>
      Beginners के लिए  
      <span>Pro Level Meta Ads</span><br />
      अब 1 Click में
    </h1>

    <p>
      Ads सीखने की जरूरत नहीं ❌<br />
      Agency की जरूरत नहीं ❌<br />
      बस details भरो और result देखो ✅
    </p>

    <!-- 🔥 FORM -->
    <div class="form-box">

      <select id="business">
        <option value="restaurant">Restaurant</option>
        <option value="school">School</option>
        <option value="service">Service</option>
      </select>

      <br>

      <select id="goal">
        <option value="whatsapp">WhatsApp</option>
        <option value="leads">Leads</option>
      </select>
<input type="text" id="location" placeholder="Enter City" />
      <br>

      <input type="number" id="budget" value="500" placeholder="Enter Budget" />

    </div>

    <!-- 🔥 BUTTON -->
    <div class="cta" onclick="getStrategy()">
      🚀 Generate Ads Strategy
    </div>

    <!-- ❌ ERROR -->
    <div id="error" class="error"></div>

    <!-- 🔥 RESULT -->
    <div id="result"></div>

  </section>

  <script>
    async function getStrategy() {

      const business = document.getElementById("business").value;
      const goal = document.getElementById("goal").value;
      const budget = document.getElementById("budget").value;
      const location = document.getElementById("location").value;

      document.getElementById("error").innerText = "";

      try {
        const res = await fetch("http://localhost:5000/ads/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
         body: JSON.stringify({
  business,
  goal,
  budget,
  location
})
        });

        if (!res.ok) {
          throw new Error("Server error");
        }

        const data = await res.json();

        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerHTML = `
          <h2>🔥 Strategy Result</h2>
          <p><b>Campaign:</b> ${data.campaign || "-"}</p>
          <p><b>Audience:</b> ${data.audience || "-"}</p>
          <p><b>Creative:</b> ${data.creative || "-"}</p>
          <p><b>Timing:</b> ${data.timing || "-"}</p>
          <p><b>Setup:</b> ${data.setup || "-"}</p>
          <hr style="margin:15px 0;">

<h3>🔥 Ad Creative</h3>

<p><b>Headline:</b> ${data.headline}</p>

<p><b>Text:</b><br>${data.primaryText}</p>

<p><b>CTA:</b> ${data.cta}</p>
        `;

      } catch (err) {
        document.getElementById("error").innerText =
          "❌ Backend connect nahi ho raha. Server ON karo.";
        console.error(err);
      }
    }
  </script>

</body>
</html>
