<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoMetaAds PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#020617;color:#fff;text-align:center;}
.navbar{padding:20px;border-bottom:1px solid #1f2933;}
.logo{color:#22c55e;font-weight:bold;font-size:22px;}
.hero{padding:60px 20px;}

input,select{
padding:10px;margin:10px;
border-radius:6px;border:none;width:220px;
}

.cta{
background:#22c55e;color:#000;
padding:15px 30px;border-radius:10px;
font-weight:bold;cursor:pointer;margin:10px;
display:inline-block;
}

#posterResult img{
width:260px;border-radius:12px;margin-top:15px;
}

.box{
background:#111;
padding:15px;
border-radius:10px;
margin-top:20px;
max-width:500px;
margin:auto;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">AutoMetaAds PRO</div>
</div>

<section class="hero">

<h1>🔥 AI Ads Creator</h1>

<select id="business">
<option value="restaurant">Restaurant</option>
<option value="school">School</option>
<option value="service">Service</option>
<option value="salon">Salon</option>
<option value="clothing">Clothing</option>
<option value="gym">Gym</option>
</select>

<input type="text" id="location" placeholder="City">

<br>

<input type="text" id="bname" placeholder="Business Name">
<input type="text" id="offer" placeholder="Offer (50% OFF)">
<input type="text" id="phone" placeholder="Phone / WhatsApp">

<br>

<input type="file" id="logoInput">

<br>

<div class="cta" onclick="generatePoster()">🎨 Generate Posters</div>

<div id="posterResult"></div>

</section>

<script>

// LOGO
let logoImg=null;
document.getElementById("logoInput").addEventListener("change",function(e){
const reader=new FileReader();
reader.onload=function(event){
logoImg=new Image();
logoImg.src=event.target.result;
};
reader.readAsDataURL(e.target.files[0]);
});

// 🔥 BUSINESS IMAGES
function getImages(business,location){
const map={
restaurant:`food,restaurant,dish`,
clothing:`fashion,clothing,model`,
salon:`salon,hair,beauty`,
gym:`fitness,gym,workout`,
school:`school,classroom`,
service:`office,business`
};
let key=map[business]||business;
return [
`https://source.unsplash.com/1080x1080/?${key},${location},${Math.random()}`,
`https://picsum.photos/1080?random=${Math.random()}`
];
}

// 🔥 AI STYLE HEADLINES
function getHeadline(business,location,name){
const list=[
`🔥 ${name} – ${location} का No.1 ${business}`,
`😍 ${location} में सबसे trusted ${business}`,
`🚀 Premium ${business} experience`,
`💯 Best ${business} service near you`,
`⚡ Limited time ${business} offer`,
`🔥 Upgrade your ${business} today`
];
return list[Math.floor(Math.random()*list.length)];
}

// 🔥 CAPTION
function generateCaption(business,location,name,offer){
return {
caption:`🔥 ${name} – Best ${business} in ${location}
${offer ? "🎁 "+offer : ""}
आज ही visit करें!
📍 ${location}
📲 Contact Now`,
hashtags:`#${name.replace(/\s/g,"")} #${location} #${business} #marketing #growth #ads #india`
};
}

// 🔥 STRATEGY
function generateStrategy(business,location){
return `
📊 Ads Strategy:

• Platform: Facebook + Instagram Ads  
• Target: ${location} (5 KM radius)  
• Audience: Local customers interested in ${business}  
• Budget: ₹300-₹500/day  
• Creative: Offer + Emotional hook  
• CTA: WhatsApp / Call Now  
`;
}

// 🔥 LOAD IMAGE
function loadImage(url){
return new Promise((res,rej)=>{
const img=new Image();
img.crossOrigin="anonymous";
img.onload=()=>res(img);
img.onerror=()=>rej();
img.src=url;
});
}

// 🎨 MAIN
async function generatePoster(){
  const res = await fetch("http://localhost:5000/generate-image",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({business,location,offer})
});

const data = await res.json();

img = await loadImage(data.image);

const container=document.getElementById("posterResult");
container.innerHTML="⏳ Generating...";

const business=document.getElementById("business").value;
const location=document.getElementById("location").value || "india";
const name=document.getElementById("bname").value || "Your Business";
const offer=document.getElementById("offer").value;
const phone=document.getElementById("phone").value || "Contact Now";

container.innerHTML="";

for(let i=0;i<2;i++){

let urls=getImages(business,location);
let img;

for(let url of urls){
try{
img=await loadImage(url);
break;
}catch(e){}
}

const canvas=document.createElement("canvas");
canvas.width=1080;
canvas.height=1080;
const ctx=canvas.getContext("2d");

// BG
if(img) ctx.drawImage(img,0,0,1080,1080);

// GRADIENT OVERLAY
let grad=ctx.createLinearGradient(0,0,0,1080);
grad.addColorStop(0,"rgba(0,0,0,0.3)");
grad.addColorStop(1,"rgba(0,0,0,0.9)");
ctx.fillStyle=grad;
ctx.fillRect(0,0,1080,1080);

ctx.textAlign="center";

// LOGO
if(logoImg) ctx.drawImage(logoImg,800,40,200,200);

// NAME
ctx.fillStyle="#22c55e";
ctx.font="bold 50px Arial";
ctx.fillText(name,540,120);

// HEADLINE
let headline=getHeadline(business,location,name);
ctx.fillStyle="#fff";
ctx.font="bold 75px Arial";
wrapText(ctx,headline,540,420,800,90);

// OFFER TAG 🎯
if(offer){
ctx.fillStyle="#ff3b3b";
ctx.fillRect(390,250,300,80);
ctx.fillStyle="#fff";
ctx.font="bold 35px Arial";
ctx.fillText(offer,540,305);
}

// CTA
ctx.fillStyle=i===0 ? "#22c55e" : "#ff3b3b";
ctx.fillRect(300,750,480,120);

ctx.fillStyle="#000";
ctx.font="bold 45px Arial";
ctx.fillText(phone,540,820);

const imgData=canvas.toDataURL();

container.innerHTML+=`
<img src="${imgData}">
<br>
<a href="${imgData}" download="poster-${i}.png" class="cta">Download</a>
`;
}

// CAPTION + STRATEGY
const ad=generateCaption(business,location,name,offer);
const strategy=generateStrategy(business,location);

container.innerHTML+=`
<div class="box">
<h3>📢 Caption</h3>
<p>${ad.caption.replace(/\n/g,"<br>")}</p>

<h3>🔥 Hashtags</h3>
<p>${ad.hashtags}</p>

<h3>📊 Ads Strategy</h3>
<p>${strategy.replace(/\n/g,"<br>")}</p>
</div>
`;
}

// wrap
function wrapText(ctx,text,x,y,maxWidth,lineHeight){
const words=text.split(" ");
let line="";
for(let n=0;n<words.length;n++){
let testLine=line+words[n]+" ";
if(ctx.measureText(testLine).width>maxWidth){
ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;
}else line=testLine;
}
ctx.fillText(line,x,y);
}

</script>

</body>
</html>
