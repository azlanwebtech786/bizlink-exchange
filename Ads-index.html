<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoMetaAds PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#020617;color:#fff;text-align:center;}
.navbar{padding:20px;border-bottom:1px solid #1f2933;}
.logo{color:#22c55e;font-weight:bold;font-size:22px;}
.hero{padding:60px 20px;}

input,select{
padding:10px;margin:10px;
border-radius:6px;border:none;width:220px;
}

.cta{
background:#22c55e;color:#000;
padding:15px 30px;border-radius:10px;
font-weight:bold;cursor:pointer;margin:10px;
display:inline-block;
}

#posterResult img{
width:260px;border-radius:12px;margin-top:15px;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">AutoMetaAds PRO</div>
</div>

<section class="hero">

<h1>🔥 AI Ads Creator</h1>

<select id="business">
<option value="restaurant">Restaurant</option>
<option value="school">School</option>
<option value="service">Service</option>
</select>

<input type="text" id="location" placeholder="City">

<br>

<input type="text" id="bname" placeholder="Business Name">
<input type="text" id="offer" placeholder="Offer (50% OFF)">
<input type="text" id="phone" placeholder="Phone / WhatsApp">

<br>

<div class="cta" onclick="generatePoster()">🎨 Generate Posters</div>

<div id="posterResult"></div>

</section>

<script>

// 🔥 HEADLINES
function getHeadlines(business,location){
return [
`Best ${business} in ${location} 🔥`,
`Top ${business} Near You 😍`,
`Trusted ${business} Service 💯`,
`Premium ${business} Experience 🚀`
];
}

// 🔥 SAFE IMAGE LOADER (FIX)
function loadImage(url){
return new Promise((resolve,reject)=>{
const img=new Image();
img.crossOrigin="anonymous";

img.onload=()=>resolve(img);
img.onerror=()=>reject();

img.src=url;
});
}

// 🎨 MAIN POSTER FUNCTION
async function generatePoster(){

const container=document.getElementById("posterResult");
container.innerHTML="⏳ Generating...";

const business=document.getElementById("business").value;
const location=document.getElementById("location").value || "india";
const name=document.getElementById("bname").value || "Your Business";
const offer=document.getElementById("offer").value || "";
const phone=document.getElementById("phone").value || "Contact Now";

const headlines=getHeadlines(business,location);

// 2 posters only
const selected=[
headlines[Math.floor(Math.random()*headlines.length)],
headlines[Math.floor(Math.random()*headlines.length)]
];

container.innerHTML="";

for(let i=0;i<2;i++){

let headline=selected[i];

// 🔥 MULTIPLE IMAGE SOURCES (fallback fix)
let urls=[
`https://source.unsplash.com/1080x1080/?${business},${location},${Math.random()}`,
`https://picsum.photos/1080?random=${Math.random()}` // fallback
];

let img;

for(let url of urls){
try{
img=await loadImage(url);
break;
}catch(e){}
}

// अगर दोनों fail हो जाए
if(!img){
img=new Image();
img.src="";
}

const canvas=document.createElement("canvas");
canvas.width=1080;
canvas.height=1080;
const ctx=canvas.getContext("2d");

// draw bg
if(img.complete){
ctx.drawImage(img,0,0,1080,1080);
}else{
ctx.fillStyle="#111";
ctx.fillRect(0,0,1080,1080);
}

// overlay
ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,1080,1080);

ctx.textAlign="center";

// brand
ctx.fillStyle="#22c55e";
ctx.font="bold 55px Arial";
ctx.fillText(name,540,120);

// headline
ctx.fillStyle="#fff";
ctx.font="bold 85px Arial";
wrapText(ctx,headline,540,420,800,90);

// offer
ctx.fillStyle="#facc15";
ctx.font="45px Arial";
wrapText(ctx,offer,540,550,800,70);

// CTA
ctx.fillStyle=i===0 ? "#22c55e" : "#ff3b3b";
ctx.fillRect(300,750,480,120);

ctx.fillStyle="#000";
ctx.font="bold 45px Arial";
ctx.fillText(phone,540,820);

// output
const imgData=canvas.toDataURL();

container.innerHTML+=`
<img src="${imgData}">
<br>
<a href="${imgData}" download="poster-${i}.png" class="cta">Download</a>
`;
}

}

// wrap text
function wrapText(ctx,text,x,y,maxWidth,lineHeight){
const words=text.split(" ");
let line="";
for(let n=0;n<words.length;n++){
let testLine=line+words[n]+" ";
let width=ctx.measureText(testLine).width;
if(width>maxWidth && n>0){
ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;
}else{
line=testLine;
}
}
ctx.fillText(line,x,y);
}

</script>

</body>
</html>
