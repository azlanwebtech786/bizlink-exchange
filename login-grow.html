<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-6 rounded-xl shadow w-80 text-center">

  <h2 class="text-xl font-bold mb-4">Login</h2>

  <!-- GOOGLE LOGIN -->
  <button onclick="googleLogin()" 
    class="w-full bg-red-500 text-white py-2 rounded mb-3 hover:bg-red-600">
    Continue with Google 🚀
  </button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, GoogleAuthProvider, signInWithPopup 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcSrWFZGputQMjk-gGsCcEzFpBPiOmBcI",
  authDomain: "bizlink-new.firebaseapp.com",
  projectId: "bizlink-new"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

// 🔥 GOOGLE LOGIN FUNCTION
window.googleLogin = async ()=>{

  try{
    const result = await signInWithPopup(auth, provider);

    const user = result.user;

    alert("Welcome " + user.displayName + " 🎉");

    // 👉 redirect
    window.location.href = "bizlink-business-grow.html";

  } catch(err){
    console.error(err);
    alert("Login failed ❌");
  }

};

</script>

</body>
</html>
