<!DOCTYPE html>
<html>
<head>
  <title>Login | Bizlink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded-xl shadow w-80">

  <h2 class="text-xl font-bold mb-4 text-center">Login</h2>

  <input id="email" placeholder="Email" class="w-full p-2 mb-3 border rounded">
  <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-3 border rounded">

  <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded mb-2">
    Login
  </button>

  <button onclick="signup()" class="w-full bg-green-600 text-white p-2 rounded">
    Signup
  </button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcSrWFZGputQMjk-gGsCcEzFpBPiOmBcI",
  authDomain: "bizlink-new.firebaseapp.com",
  projectId: "bizlink-new"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = async ()=>{
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth,email,pass);
    alert("Login Success ✅");
    window.location.href = "index.html";
  }catch(e){
    alert(e.message);
  }
};

// SIGNUP
window.signup = async ()=>{
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try{
    await createUserWithEmailAndPassword(auth,email,pass);
    alert("Account Created ✅");
  }catch(e){
    alert(e.message);
  }
};

</script>

</body>
</html>
