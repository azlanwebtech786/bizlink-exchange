<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div id="detail" class="max-w-4xl mx-auto p-6 text-center">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcSrWFZGputQMjk-gGsCcEzFpBPiOmBcI",
  authDomain: "bizlink-new.firebaseapp.com",
  projectId: "bizlink-new"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(window.location.search).get("id");
const container = document.getElementById("detail");

// 🔥 TRACK
function track(type){
  updateDoc(doc(db,"businesses",id), {
    [type]: increment(1)
  }).catch(()=>{});
}

async function load(){
  const snap = await getDoc(doc(db,"businesses",id));

  if(!snap.exists()){
    container.innerHTML = "Business not found";
    return;
  }

  const b = snap.data();

  // 👁 VIEW
  track("views");

  // 📍 MAP
  let mapUrl = "https://www.google.com/maps?q=" + encodeURIComponent(b.location);

  container.innerHTML = `
    <div class="bg-white p-6 rounded-xl shadow text-left">

      <img src="${b.image || 'https://via.placeholder.com/600'}"
        class="w-full h-64 object-cover rounded">

      <h1 class="text-2xl font-bold mt-4">${b.name}</h1>
      <p class="text-gray-500">${b.location}</p>
      <p class="text-blue-500">${b.category}</p>

      <p class="mt-4">${b.description || ""}</p>

      <!-- BUTTONS -->
      <div class="flex gap-3 mt-6">

        <button onclick="callNow('${b.phone}')"
          class="bg-blue-500 text-white px-4 py-2 rounded">
          Call
        </button>

        <button onclick="whatsappNow('${b.whatsapp}')"
          class="bg-green-500 text-white px-4 py-2 rounded">
          WhatsApp
        </button>

      </div>

      <!-- MAP -->
      <div class="mt-6">
        <h3 class="font-bold mb-2">📍 Location</h3>

        <iframe 
          src="https://www.google.com/maps?q=${encodeURIComponent(b.location)}&output=embed"
          class="w-full h-60 rounded">
        </iframe>

        <a href="${mapUrl}" target="_blank">
          <button class="mt-3 bg-indigo-600 text-white px-4 py-2 rounded">
            Get Directions
          </button>
        </a>
      </div>

    </div>
  `;
}

// 📞 CALL
window.callNow = (phone)=>{
  track("calls");
  window.location.href = "tel:"+phone;
};

// 💬 WHATSAPP
window.whatsappNow = (num)=>{
  track("whatsappClicks");
  window.open("https://wa.me/91"+num, "_blank");
};

load();

</script>

</body>
</html>
