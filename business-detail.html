<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div id="detail" class="max-w-3xl mx-auto p-6"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcSrWFZGputQMjk-gGsCcEzFpBPiOmBcI",
  authDomain: "bizlink-new.firebaseapp.com",
  projectId: "bizlink-new"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const container = document.getElementById("detail");

const docRef = doc(db, "businesses", id);
const docSnap = await getDoc(docRef);

if(docSnap.exists()){
  const b = docSnap.data();

  container.innerHTML = `
    <div class="bg-white rounded-xl shadow p-6">

      <img src="${b.image || 'https://via.placeholder.com/400'}"
        class="w-full h-64 object-cover rounded">

      <h1 class="text-2xl font-bold mt-4">${b.name}</h1>
      <p class="text-gray-500">${b.location}</p>
      <p class="text-blue-500">${b.category}</p>

      <p class="mt-4">${b.description || "No description"}</p>

      <div class="flex gap-3 mt-6">
        <a href="https://wa.me/91${b.whatsapp}" target="_blank">
          <button class="bg-green-500 text-white px-4 py-2 rounded">
            WhatsApp
          </button>
        </a>

        <a href="tel:${b.phone}">
          <button class="bg-blue-500 text-white px-4 py-2 rounded">
            Call
          </button>
        </a>
      </div>

    </div>
  `;
} else {
  container.innerHTML = "<p>Business not found</p>";
}

</script>

</body>
</html>
