<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div id="detail" class="max-w-4xl mx-auto p-6 text-center">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, doc, getDoc, 
  collection, addDoc, getDocs, serverTimestamp, 
  updateDoc, increment, query, where 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { 
  getAuth, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcSrWFZGputQMjk-gGsCcEzFpBPiOmBcI",
  authDomain: "bizlink-new.firebaseapp.com",
  projectId: "bizlink-new"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const container = document.getElementById("detail");

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
  container.innerHTML = "Invalid Business";
  throw new Error("No ID");
}

let currentUser = null;

// 🔐 LOGIN CHECK
onAuthStateChanged(auth, async (user)=>{
  
  if(!user){
    alert("Login required");
    window.location.href = "login-grow.html";
    return;
  }

  currentUser = user;
  loadPage();
});

// 📊 TRACK
async function track(type){
  const ref = doc(db,"businesses",id);
  await updateDoc(ref,{ [type]: increment(1) });
}

// ⭐ REVIEW
window.submitReview = async ()=>{
  const name = rName.value;
  const rating = rRating.value;
  const comment = rComment.value;

  if(!name || !rating || !comment){
    alert("Fill all fields");
    return;
  }

  const q = query(
    collection(db,"reviews"),
    where("businessId","==",id),
    where("user","==",currentUser.email)
  );

  const snap = await getDocs(q);

  if(!snap.empty){
    alert("❌ Already reviewed");
    return;
  }

  await addDoc(collection(db,"reviews"),{
    businessId: id,
    user: currentUser.email,
    name,
    rating,
    comment,
    time: serverTimestamp()
  });

  alert("Review Added ✅");
  location.reload();
};

// 📝 BLOG
window.submitBlog = async ()=>{
  const title = bTitle.value;
  const content = bContent.value;

  if(!title || !content){
    alert("Fill blog fields");
    return;
  }

  const q = query(
    collection(db,"blogs"),
    where("businessId","==",id),
    where("user","==",currentUser.email)
  );

  const snap = await getDocs(q);

  if(!snap.empty){
    alert("❌ Already posted blog");
    return;
  }

  await addDoc(collection(db,"blogs"),{
    businessId: id,
    user: currentUser.email,
    title,
    content,
    time: serverTimestamp()
  });

  alert("Blog Posted ✅");
  location.reload();
};

// 🚀 LOAD PAGE
async function loadPage(){

  try {

    const docRef = doc(db,"businesses",id);
    const snap = await getDoc(docRef);

    if(snap.exists()){
      const b = snap.data();

      // 🔥 MAP FIX
      let mapEmbed = "";
      let mapButton = "";

      if(b.mapLink){
        mapEmbed = b.mapLink.replace("maps.google.com", "www.google.com/maps/embed");
        mapButton = b.mapLink;
      } else {
        mapEmbed = "https://www.google.com/maps?q=" + encodeURIComponent(b.location) + "&output=embed";
        mapButton = "https://www.google.com/maps?q=" + encodeURIComponent(b.location);
      }

      container.innerHTML = `
        <div class="bg-white rounded-xl shadow p-6 text-left">

          <img src="${b.image || 'https://via.placeholder.com/600'}"
          class="w-full h-64 object-cover rounded">

          <h1 class="text-2xl font-bold mt-4">${b.name}</h1>
          <p class="text-gray-500">${b.location}</p>
          <p class="text-blue-500">${b.category}</p>

          <p class="mt-4">${b.description || ""}</p>

          <div class="flex gap-3 mt-6 flex-wrap">
            <a onclick="track('whatsappClicks')" href="https://wa.me/91${b.whatsapp}" target="_blank">
              <button class="bg-green-500 text-white px-4 py-2 rounded">WhatsApp</button>
            </a>

            <a onclick="track('calls')" href="tel:${b.phone}">
              <button class="bg-blue-500 text-white px-4 py-2 rounded">Call</button>
            </a>
          </div>

          <!-- 🔥 MAP -->
          <div class="mt-6">
            <h3 class="font-bold mb-2">📍 Location</h3>

            <iframe 
              src="${mapEmbed}"
              class="w-full h-60 rounded">
            </iframe>

            <a href="${mapButton}" target="_blank">
              <button class="mt-3 bg-indigo-600 text-white px-4 py-2 rounded">
                Get Directions 🚀
              </button>
            </a>
          </div>

          <h2 class="text-xl font-bold mt-6">⭐ Reviews</h2>
          <div id="reviews"></div>

          <div class="bg-gray-100 p-4 mt-3 rounded">
            <input id="rName" placeholder="Name" class="w-full p-2 mb-2">
            <select id="rRating" class="w-full p-2 mb-2">
              <option>5</option><option>4</option><option>3</option>
              <option>2</option><option>1</option>
            </select>
            <textarea id="rComment" class="w-full p-2 mb-2"></textarea>
            <button onclick="submitReview()" class="bg-indigo-600 text-white px-4 py-2 rounded">
              Submit Review
            </button>
          </div>

          <h2 class="text-xl font-bold mt-6">📝 Blogs</h2>
          <div id="blogs"></div>

          <div class="bg-gray-100 p-4 mt-3 rounded">
            <input id="bTitle" class="w-full p-2 mb-2">
            <textarea id="bContent" class="w-full p-2 mb-2"></textarea>
            <button onclick="submitBlog()" class="bg-green-600 text-white px-4 py-2 rounded">
              Post Blog
            </button>
          </div>

        </div>
      `;

      // REVIEWS
      const reviewSnap = await getDocs(collection(db,"reviews"));
      reviewSnap.forEach(d=>{
        const r = d.data();
        if(r.businessId === id){
          reviews.innerHTML += `
            <div class="bg-white p-3 mt-2 rounded shadow">
              <b>${r.name}</b> ⭐${r.rating}
              <p>${r.comment}</p>
            </div>
          `;
        }
      });

      // BLOGS
      const blogSnap = await getDocs(collection(db,"blogs"));
      blogSnap.forEach(d=>{
        const bl = d.data();
        if(bl.businessId === id){
          blogs.innerHTML += `
            <div class="bg-white p-3 mt-2 rounded shadow">
              <b>${bl.title}</b>
              <p>${bl.content}</p>
            </div>
          `;
        }
      });

    } else {
      container.innerHTML = "Business not found";
    }

  } catch(err){
    console.error(err);
    container.innerHTML = "Error loading data";
  }

}

</script>

</body>
</html>
