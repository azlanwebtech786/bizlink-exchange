<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Ads Engine Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Navbar -->
<div class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Bizlink Ads</h1>
  <div class="w-8 h-8 bg-gray-300 rounded-full"></div>
</div>

<!-- Dashboard -->
<div class="p-4">
  <button onclick="showSection('create')" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 rounded-xl text-lg mb-4 hover:scale-105 transition">🚀 Run New Ad</button>

  <div class="grid grid-cols-2 gap-4">
    <div class="bg-white p-4 rounded-xl shadow text-center">📊 My Ads</div>
    <div class="bg-white p-4 rounded-xl shadow text-center">💰 Performance</div>
  </div>
</div>

<!-- Create -->
<div id="create" class="hidden p-4 space-y-4">

  <!-- Upload -->
  <div class="bg-white p-4 rounded-xl shadow">
    <p class="mb-2 font-medium">Upload Creative</p>
    <input type="file" id="upload" class="w-full border p-2 rounded">
    <img id="preview" class="mt-3 rounded hidden max-h-40"/>
  </div>

  <!-- Business -->
  <div class="bg-white p-4 rounded-xl shadow">
    <p class="mb-2 font-medium">Business Type</p>
    <div class="grid grid-cols-2 gap-2">
      <button class="select-btn p-2 border rounded">Coaching</button>
      <button class="select-btn p-2 border rounded">Furniture</button>
      <button class="select-btn p-2 border rounded">Real Estate</button>
      <button class="select-btn p-2 border rounded">Other</button>
    </div>
  </div>

  <!-- Goal -->
  <div class="bg-white p-4 rounded-xl shadow">
    <p class="mb-2 font-medium">Goal</p>
    <div class="flex gap-2">
      <button class="select-btn flex-1 p-2 border rounded">📞 Leads</button>
      <button class="select-btn flex-1 p-2 border rounded">💬 WhatsApp</button>
      <button class="select-btn flex-1 p-2 border rounded">🌐 Traffic</button>
    </div>
  </div>

  <!-- Location -->
  <div class="bg-white p-4 rounded-xl shadow">
    <p class="mb-2 font-medium">Location</p>
    <input type="text" placeholder="Enter city" class="w-full border p-2 rounded" id="location">
  </div>

  <!-- Budget -->
  <div class="bg-white p-4 rounded-xl shadow">
    <p class="mb-2 font-medium">Budget</p>
    <input type="range" min="500" max="10000" id="budget" class="w-full">
    <p id="budgetValue" class="text-blue-600 font-semibold">₹1500</p>
    <p class="text-sm text-gray-500">Recommended: ₹1500</p>
  </div>

  <!-- CTA -->
  <button onclick="launchAd()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-xl text-lg hover:scale-105 transition">
    🚀 Launch My Ad
  </button>

</div>

<!-- Processing -->
<div id="processing" class="hidden p-4 flex flex-col items-center justify-center h-64">
  <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  <p class="mt-4 text-lg">Optimizing your campaign...</p>
</div>

<!-- Success -->
<div id="success" class="hidden p-4 text-center">
  <h2 class="text-xl font-bold text-green-600">✅ Ad is LIVE</h2>

  <div id="resultBox" class="bg-white p-4 rounded-xl shadow mt-4">
    <h3 class="font-bold text-lg mb-2">📊 AI Ad Result</h3>
    <p id="targeting"></p>
    <p id="strategy"></p>
    <p id="probability"></p>
  </div>

</div>

<script>

// SECTION SWITCH
function showSection(id) {
  document.querySelectorAll('#create, #processing, #success').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// BUTTON SELECT
document.querySelectorAll('.select-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.parentElement;
    group.querySelectorAll('.select-btn').forEach(b => {
      b.classList.remove('bg-blue-600','text-white');
    });
    btn.classList.add('bg-blue-600','text-white');
  });
});

// BUDGET
const slider = document.getElementById('budget');
const output = document.getElementById('budgetValue');
slider.oninput = function() {
  output.innerText = "₹" + this.value;
}

// IMAGE PREVIEW
upload.onchange = evt => {
  const [file] = upload.files;
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.classList.remove('hidden');
  }
}

// 🚀 MAIN FUNCTION (CONNECTED TO n8n)
async function launchAd() {

  showSection('processing');

  const data = {
    businessType: document.querySelector('.select-btn.bg-blue-600')?.innerText,
    goal: document.querySelectorAll('.select-btn.bg-blue-600')[1]?.innerText,
    location: document.getElementById('location').value,
    budget: document.getElementById('budget').value
  };

  try {

    const res = await fetch("https://bizlink-ads-engine.app.n8n.cloud/webhook/create-ad", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    showSection('success');

    document.getElementById("targeting").innerText =
      "🎯 Target: " + result.targeting;

    document.getElementById("strategy").innerText =
      "⚙️ Strategy: " + result.strategy;

    document.getElementById("probability").innerText =
      "📈 Success Chance: " + result.probability;

  } catch (error) {
    alert("Server Error ❌");
  }
}

</script>

</body>
</html>
