<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Ads Engine Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- Navbar -->
<div class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Bizlink Ads</h1>
  <div class="w-8 h-8 bg-gray-300 rounded-full"></div>
</div>

<!-- Dashboard -->
<div class="p-4">
  <button onclick="showSection('create')" 
    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 rounded-xl text-lg mb-4 hover:scale-105 transition">
    🚀 Run New Ad
  </button>

  <div class="grid grid-cols-2 gap-4">
    <div class="bg-white p-4 rounded-xl shadow text-center">📊 My Ads</div>
    <div class="bg-white p-4 rounded-xl shadow text-center">💰 Performance</div>
  </div>
</div>

<!-- Create -->
<div id="create" class="hidden p-4 space-y-4">

  <div class="bg-white p-4 rounded-xl shadow">
    <p class="mb-2 font-medium">Business Type</p>
    <div class="grid grid-cols-2 gap-2">
      <button class="select-btn p-2 border rounded">Coaching</button>
      <button class="select-btn p-2 border rounded">Furniture</button>
      <button class="select-btn p-2 border rounded">Real Estate</button>
      <button class="select-btn p-2 border rounded">Other</button>
    </div>
  </div>

  <div class="bg-white p-4 rounded-xl shadow">
    <p class="mb-2 font-medium">Goal</p>
    <div class="flex gap-2">
      <button class="select-btn flex-1 p-2 border rounded">Leads</button>
      <button class="select-btn flex-1 p-2 border rounded">WhatsApp</button>
      <button class="select-btn flex-1 p-2 border rounded">Traffic</button>
    </div>
  </div>

  <div class="bg-white p-4 rounded-xl shadow">
    <p class="mb-2 font-medium">Location</p>
    <input type="text" id="location" placeholder="Enter city" class="w-full border p-2 rounded">
  </div>

  <div class="bg-white p-4 rounded-xl shadow">
    <p class="mb-2 font-medium">Budget</p>
    <input type="range" min="500" max="10000" value="1500" id="budget" class="w-full">
    <p id="budgetValue" class="text-blue-600 font-semibold">₹1500</p>
  </div>

  <button onclick="launchAd()" 
    class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-xl text-lg hover:scale-105 transition">
    🚀 Launch My Ad
  </button>

</div>

<!-- Processing -->
<div id="processing" class="hidden p-4 flex flex-col items-center justify-center h-64">
  <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  <p class="mt-4 text-lg">Optimizing your campaign...</p>
</div>

<!-- Success -->
<div id="success" class="hidden p-4 text-center">
  <h2 class="text-xl font-bold text-green-600">✅ Ad is LIVE</h2>

  <div class="bg-white p-4 rounded-xl shadow mt-4">
    <h3 class="font-bold text-lg mb-2">📊 AI Ad Result</h3>
    <p id="targeting"></p>
    <p id="strategy"></p>
    <p id="probability"></p>
  </div>
</div>

<script>

// section switch
function showSection(id) {
  document.querySelectorAll('#create, #processing, #success')
    .forEach(el => el.classList.add('hidden'));

  document.getElementById(id).classList.remove('hidden');
}

// select buttons
document.querySelectorAll('.select-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.parentElement;
    group.querySelectorAll('.select-btn')
      .forEach(b => b.classList.remove('bg-blue-600','text-white'));

    btn.classList.add('bg-blue-600','text-white');
  });
});

// budget slider
const slider = document.getElementById('budget');
const output = document.getElementById('budgetValue');

slider.oninput = function() {
  output.innerText = "₹" + this.value;
}

// 🚀 MAIN FUNCTION
async function launchAd() {

  showSection('processing');

  const selected = document.querySelectorAll('.select-btn.bg-blue-600');

  const data = {
    businessType: selected[0]?.innerText || "Coaching",
    goal: selected[1]?.innerText || "Leads",
    location: document.getElementById('location').value || "India",
    budget: document.getElementById('budget').value || "1500"
  };

  try {

    const res = await fetch("https://bizlink-ads-engine.app.n8n.cloud/webhook/create-ad", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const raw = await res.json();

    console.log("FULL RESPONSE:", raw);

    // 🔥 FIX
    const result = raw[0]?.json || {};

    showSection('success');

    document.getElementById("targeting").innerText =
      "🎯 Target: " + (result.targeting || "General Audience");

    document.getElementById("strategy").innerText =
      "⚙️ Strategy: " + (result.strategy || "AI Optimization");

    document.getElementById("probability").innerText =
      "📈 Success Chance: " + (result.probability || "80%");

  } catch (err) {
    console.error(err);
    alert("Server Error ❌");
  }
}

</script>

</body>
</html>
