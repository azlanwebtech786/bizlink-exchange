<!DOCTYPE html>
<html>
<head>
  <title>Bizlink Owner Dashboard</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 5px;
    }

    .edit { background: #22c55e; color: white; }
    .delete { background: #ef4444; color: white; }
    .save { background: #3b82f6; color: white; }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h1>📊 Owner Dashboard</h1>

<div id="container"></div>

<!-- EDIT FORM -->
<div id="editSection" class="hidden">
  <h2>✏️ Edit Business</h2>

  <input id="name" placeholder="Business Name">
  <input id="phone" placeholder="Phone">
  <input id="whatsapp" placeholder="WhatsApp">
  <input id="address" placeholder="Address">
  <textarea id="description" placeholder="Description"></textarea>
  <input type="file" id="image">

  <button class="save" onclick="updateBusiness()">💾 Save</button>
</div>

<script type="module">

// 🔥 Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  doc,
  deleteDoc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";


// 🔥 CONFIG (अपना डाल)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  appId: "YOUR_APP_ID"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const container = document.getElementById("container");
const editSection = document.getElementById("editSection");

let currentEditId = null;

// 🔐 LOGIN CHECK
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Login required");
    window.location.href = "/login.html";
    return;
  }

  loadBusinesses(user.uid);
});

// 📊 LOAD BUSINESSES
async function loadBusinesses(uid) {
  const q = query(
    collection(db, "businesses"),
    where("ownerId", "==", uid)
  );

  const snapshot = await getDocs(q);

  container.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const id = docSnap.id;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>${data.name}</h2>

      <p>👁 Views: ${data.views || 0}</p>
      <p>📞 Calls: ${data.calls || 0}</p>
      <p>💬 WhatsApp: ${data.whatsappClicks || 0}</p>

      <button class="edit" onclick="editBusiness('${id}')">✏️ Edit</button>
      <button class="delete" onclick="deleteBusiness('${id}')">🗑 Delete</button>
    `;

    container.appendChild(div);
  });
}

// ✏️ EDIT
window.editBusiness = async (id) => {
  currentEditId = id;

  const docRef = doc(db, "businesses", id);
  const snap = await getDoc(docRef);
  const data = snap.data();

  document.getElementById("name").value = data.name || "";
  document.getElementById("phone").value = data.phone || "";
  document.getElementById("whatsapp").value = data.whatsapp || "";
  document.getElementById("address").value = data.address || "";
  document.getElementById("description").value = data.description || "";

  editSection.classList.remove("hidden");
};

// 💾 UPDATE
window.updateBusiness = async () => {
  const docRef = doc(db, "businesses", currentEditId);

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const whatsapp = document.getElementById("whatsapp").value;
  const address = document.getElementById("address").value;
  const description = document.getElementById("description").value;
  const imageInput = document.getElementById("image");

  let imageUrl = "";

  if (imageInput.files[0]) {
    const file = imageInput.files[0];
    const storageRef = ref(storage, "businessImages/" + Date.now());

    await uploadBytes(storageRef, file);
    imageUrl = await getDownloadURL(storageRef);
  }

  await updateDoc(docRef, {
    name,
    phone,
    whatsapp,
    address,
    description,
    ...(imageUrl && { image: imageUrl })
  });

  alert("✅ Updated");

  editSection.classList.add("hidden");
  location.reload();
};

// 🗑 DELETE
window.deleteBusiness = async (id) => {
  if (!confirm("Delete this business?")) return;

  await deleteDoc(doc(db, "businesses", id));

  alert("Deleted!");
  location.reload();
};

</script>

</body>
</html>
