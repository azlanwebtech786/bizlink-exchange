<!DOCTYPE html>
<html>
<head>
  <title>Owner Dashboard</title>

  <style>
    body { background:#0f172a; color:white; font-family:Arial; padding:20px;}
    .card { background:#1e293b; padding:20px; border-radius:12px; margin-bottom:15px;}
    button { padding:8px 15px; border:none; border-radius:6px; cursor:pointer;}
  </style>
</head>

<body>

<h1>📊 Dashboard</h1>
<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcSrWFZGputQMjk-gScCEzFpBPiOmBcI",
  authDomain: "bizlink-new.firebaseapp.com",
  projectId: "bizlink-new"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const OWNER_ID = "2qxi6o0JE4O3Kup2xHzIoEyxBa42";
const container = document.getElementById("container");

// 🔥 LIVE DATA
const q = query(collection(db,"businesses"), where("ownerId","==",OWNER_ID));

onSnapshot(q,(snapshot)=>{
  container.innerHTML="";

  snapshot.forEach(doc=>{
    const d = doc.data();

    container.innerHTML += `
      <div class="card">
        <h2>${d.name}</h2>
        <p>👁 Views: ${d.views||0}</p>
        <p>📞 Calls: ${d.calls||0}</p>
        <p>💬 WhatsApp: ${d.whatsappClicks||0}</p>
      </div>
    `;
  });
});

</script>

</body>
</html>
