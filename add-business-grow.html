<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Business - Bizlink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">

<div class="max-w-2xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6">Add Your Business 🚀</h1>

  <form id="businessForm" class="space-y-4">

    <input type="text" id="name" placeholder="Business Name" class="w-full p-3 rounded text-black" required>

    <select id="category" class="w-full p-3 rounded text-black" required></select>

    <input type="text" id="newCategory" placeholder="Enter new category"
      class="w-full p-3 rounded text-black hidden">

    <input type="text" id="location" placeholder="Location (City/Area)" class="w-full p-3 rounded text-black" required>

    <input type="text" id="mapLink" placeholder="Paste Google Map Link OR use detect button"
      class="w-full p-3 rounded text-black">

    <button type="button" onclick="getLocation()"
      class="bg-green-600 w-full py-3 rounded">
      📍 Detect My Location
    </button>

    <div id="mapPreview" class="hidden">
      <iframe id="mapFrame" class="w-full h-60 rounded"></iframe>
    </div>

    <input type="text" id="phone" placeholder="Phone Number" class="w-full p-3 rounded text-black" required>
    <input type="text" id="whatsapp" placeholder="WhatsApp Number" class="w-full p-3 rounded text-black" required>

    <textarea id="description" placeholder="Description" class="w-full p-3 rounded text-black"></textarea>

    <input type="text" id="image" placeholder="Paste Image URL" class="w-full p-3 rounded text-black">

    <button id="submitBtn" class="bg-blue-600 px-6 py-3 w-full rounded">
      Save Business
    </button>

    <p id="statusMsg" class="text-center mt-3"></p>

  </form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcSrWFZGputQMjk-gGsCcEzFpBPiOmBcI",
  authDomain: "bizlink-new.firebaseapp.com",
  projectId: "bizlink-new",
  storageBucket: "bizlink-new.firebasestorage.app",
  messagingSenderId: "759857311400",
  appId: "1:759857311400:web:903eb700790bf53de09c9d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

// 🔐 LOGIN CHECK
onAuthStateChanged(auth, (user)=>{
  if(!user){
    alert("Please login first");
    window.location.href = "login-grow.html";
  } else {
    currentUser = user;
  }
});

const categorySelect = document.getElementById("category");
const newCategoryInput = document.getElementById("newCategory");
const submitBtn = document.getElementById("submitBtn");
const statusMsg = document.getElementById("statusMsg");

// DEFAULT CATEGORY
const defaultCategories = [
  "Salon","Coaching","Restaurant","Gym","Hospital","Hotel",
  "Electrician","Plumber","Car Service","Mobile Shop",
  "Real Estate","Repair","Boutique","Medical Store",
  "Bakery","Cafe","Photography","Event Planner",
  "Interior Designer","Travel Agency"
];

categorySelect.innerHTML = `<option value="">Select Category</option>`;
defaultCategories.forEach(cat=>{
  categorySelect.innerHTML += `<option value="${cat}">${cat}</option>`;
});
categorySelect.innerHTML += `<option value="__new__">➕ Add New Category</option>`;

// SHOW NEW CATEGORY
categorySelect.addEventListener("change", ()=>{
  if(categorySelect.value === "__new__"){
    newCategoryInput.classList.remove("hidden");
  } else {
    newCategoryInput.classList.add("hidden");
  }
});

// AUTO LOCATION
window.getLocation = () => {

  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const mapLinkVal = `https://www.google.com/maps?q=${lat},${lng}`;

    document.getElementById("mapLink").value = mapLinkVal;

    document.getElementById("mapPreview").classList.remove("hidden");
    document.getElementById("mapFrame").src =
      `https://www.google.com/maps?q=${lat},${lng}&output=embed`;

    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
    );

    const data = await res.json();

    if (data.display_name) {
      document.getElementById("location").value = data.display_name;
    }

  }, () => {
    alert("Location permission denied ❌");
  });

};

// MAP PREVIEW
document.getElementById("mapLink").addEventListener("input", (e)=>{
  const link = e.target.value;

  if(link && link.includes("google")){
    document.getElementById("mapPreview").classList.remove("hidden");
    document.getElementById("mapFrame").src =
      link.replace("maps.google.com","www.google.com/maps/embed");
  }
});

// SUBMIT
document.getElementById("businessForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  if(!currentUser){
    alert("Login required");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerText = "Listing your business...";
  statusMsg.innerText = "";

  try{

    let category = categorySelect.value;

    if(category === "__new__"){
      category = newCategoryInput.value;

      if(!category){
        alert("Enter new category");
        submitBtn.disabled = false;
        submitBtn.innerText = "Save Business";
        return;
      }
    }

    await addDoc(collection(db,"businesses"),{

      name: name.value || "",
      category: category || "",
      location: location.value || "",
      phone: phone.value || "",
      whatsapp: whatsapp.value || "",
      description: description.value || "",
      image: image.value || "",
      mapLink: mapLink.value || "",   // 🔥 FIX

      ownerId: currentUser.uid,

      calls: 0,
      whatsappClicks: 0,
      views: 0,

      createdAt: serverTimestamp()

    });

    submitBtn.innerText = "Done ✅";
    statusMsg.innerHTML = "🎉 Business listed successfully";

    businessForm.reset();

  }catch(err){
    console.error(err);
    alert("Error: " + err.message);
    submitBtn.disabled = false;
    submitBtn.innerText = "Save Business";
  }

});

</script>

</body>
</html>
