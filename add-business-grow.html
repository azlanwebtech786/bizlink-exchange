<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Business - Bizlink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">

<div class="max-w-2xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6">Add Your Business 🚀</h1>

  <form id="businessForm" class="space-y-4">

    <input type="text" id="name" placeholder="Business Name" class="w-full p-3 rounded text-black" required>

    <!-- CATEGORY DROPDOWN -->
    <select id="category" class="w-full p-3 rounded text-black" required></select>

    <!-- NEW CATEGORY INPUT (HIDDEN) -->
    <input type="text" id="newCategory" placeholder="Enter new category"
      class="w-full p-3 rounded text-black hidden">

    <input type="text" id="location" placeholder="Location" class="w-full p-3 rounded text-black" required>
    <input type="text" id="phone" placeholder="Phone Number" class="w-full p-3 rounded text-black" required>
    <input type="text" id="whatsapp" placeholder="WhatsApp Number" class="w-full p-3 rounded text-black" required>

    <textarea id="description" placeholder="Description" class="w-full p-3 rounded text-black"></textarea>

    <input type="file" id="imageFile" class="w-full p-3 bg-white text-black rounded">

    <!-- BUTTON -->
    <button id="submitBtn" class="bg-blue-600 px-6 py-3 w-full rounded">
      Save Business
    </button>

    <!-- STATUS -->
    <p id="statusMsg" class="text-center mt-3"></p>

  </form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDruI4mHLRb-KKNnThDn7Woaj28Kg0THwE",
  authDomain: "biz-link9610.firebaseapp.com",
  projectId: "biz-link9610",
  storageBucket: "biz-link9610.firebasestorage.app",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const categorySelect = document.getElementById("category");
const newCategoryInput = document.getElementById("newCategory");
const submitBtn = document.getElementById("submitBtn");
const statusMsg = document.getElementById("statusMsg");

// 🔥 DEFAULT CATEGORY
const defaultCategories = [
  "Salon","Coaching","Restaurant","Gym","Hospital","Hotel",
  "Electrician","Plumber","Car Service","Mobile Shop",
  "Real Estate","Repair","Boutique","Medical Store",
  "Bakery","Cafe","Photography","Event Planner",
  "Interior Designer","Travel Agency"
];

// LOAD DEFAULT
categorySelect.innerHTML = `<option value="">Select Category</option>`;
defaultCategories.forEach(cat=>{
  categorySelect.innerHTML += `<option value="${cat}">${cat}</option>`;
});

// 🔥 ADD NEW OPTION INSIDE SELECT
categorySelect.innerHTML += `<option value="__new__">➕ Add New Category</option>`;

// SHOW INPUT IF SELECTED
categorySelect.addEventListener("change", ()=>{
  if(categorySelect.value === "__new__"){
    newCategoryInput.classList.remove("hidden");
  } else {
    newCategoryInput.classList.add("hidden");
  }
});

// SUBMIT
document.getElementById("businessForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  // BUTTON HIDE + LOADING
  submitBtn.disabled = true;
  submitBtn.innerText = "Listing your business...";
  statusMsg.innerText = "";

  try{

    let imageURL = "";

    const file = document.getElementById("imageFile").files[0];
    if(file){
      const storageRef = ref(storage, "images/" + Date.now());
      await uploadBytes(storageRef, file);
      imageURL = await getDownloadURL(storageRef);
    }

    let category = categorySelect.value;

    // NEW CATEGORY HANDLE
    if(category === "__new__"){
      category = newCategoryInput.value;

      if(!category){
        alert("Enter new category");
        submitBtn.disabled = false;
        submitBtn.innerText = "Save Business";
        return;
      }

      await addDoc(collection(db,"categories"),{name:category});
    }

    // SAVE BUSINESS
    await addDoc(collection(db,"businesses"),{
      name: document.getElementById("name").value,
      category: category,
      location: document.getElementById("location").value,
      phone: document.getElementById("phone").value,
      whatsapp: document.getElementById("whatsapp").value,
      description: document.getElementById("description").value,
      image: imageURL,
      createdAt: new Date()
    });

    // SUCCESS MESSAGE
    submitBtn.innerText = "Done ✅";
    statusMsg.innerHTML = "🎉 Congratulations! Your business listed successfully";

    document.getElementById("businessForm").reset();

  }catch(err){
    alert("Error: " + err);
    submitBtn.disabled = false;
    submitBtn.innerText = "Save Business";
  }

});

</script>

</body>
</html>
