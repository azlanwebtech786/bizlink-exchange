<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bizlink Cash Book Secure</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}

.hidden { display:none; }

table {
  width:100%;
  margin-top:10px;
  border-collapse: collapse;
}

th, td {
  border:1px solid #334155;
  padding:8px;
}

.credit { color: #22c55e; font-weight:bold; }  /* Green */
.debit { color: #facc15; font-weight:bold; }   /* Yellow */

</style>
</head>

<body>

<h2>🔐 Bizlink Cash Book</h2>

<!-- LOGIN -->
<div id="loginBox">
  <button onclick="googleLogin()">Login with Google</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<button onclick="logout()">Logout</button>

<br><br>

<input type="date" id="date">
<input type="text" id="particulars" placeholder="Particulars">
<input type="number" id="debit" placeholder="Money Out (Debit)">
<input type="number" id="credit" placeholder="Money In (Credit)">

<button onclick="addEntry()">Add Entry</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Particulars</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZLwV2xzpIYXyBw15T2OI4j3iLz3uuEwI",
  authDomain: "bizlink-cashbook.firebaseapp.com",
  projectId: "bizlink-cashbook",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let entries = [];

// 📅 Set today's date only
const today = new Date().toISOString().split('T')[0];
document.getElementById('date').value = today;
document.getElementById('date').min = today;
document.getElementById('date').max = today;

// 🔐 GOOGLE LOGIN
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// 🚪 LOGOUT
function logout() {
  auth.signOut();
}

// 👀 AUTH STATE
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    loadData();
  } else {
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }
});

// ➕ ADD ENTRY
function addEntry() {
  const date = document.getElementById('date').value;
  const particulars = document.getElementById('particulars').value;
  const debit = Number(document.getElementById('debit').value) || 0;
  const credit = Number(document.getElementById('credit').value) || 0;

  if (!particulars) {
    alert("Enter particulars");
    return;
  }

  // Date validation (extra safety)
  if (date !== today) {
    alert("Only today's entry allowed");
    return;
  }

  db.collection("cashbook").add({
    userId: currentUser.uid,
    date,
    particulars,
    debit,
    credit,
    createdAt: new Date()
  });

  // Clear fields
  document.getElementById('particulars').value = '';
  document.getElementById('debit').value = '';
  document.getElementById('credit').value = '';
}

// 📥 LOAD DATA
function loadData() {
  db.collection("cashbook")
    .where("userId", "==", currentUser.uid)
    .orderBy("createdAt")
    .onSnapshot(snapshot => {
      entries = [];
      snapshot.forEach(doc => {
        entries.push(doc.data());
      });
      renderTable();
    });
}

// 📊 TABLE
function renderTable() {
  let balance = 0;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  entries.forEach(entry => {
    balance += entry.credit - entry.debit;

    const debitText = entry.debit ? `<span class="debit">-₹${entry.debit}</span>` : '';
    const creditText = entry.credit ? `<span class="credit">+₹${entry.credit}</span>` : '';

    const row = `
    <tr>
      <td>${entry.date}</td>
      <td>${entry.particulars}</td>
      <td>${debitText}</td>
      <td>${creditText}</td>
      <td>₹${balance}</td>
    </tr>`;

    tbody.innerHTML += row;
  });
}

</script>

</body>
</html>
