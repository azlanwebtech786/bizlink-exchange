<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bizlink Cash Book Pro</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}

.hidden { display:none; }

table {
  width:100%;
  margin-top:10px;
  border-collapse: collapse;
}

th, td {
  border:1px solid #334155;
  padding:8px;
}

.credit { color:#22c55e; font-weight:bold; }
.debit { color:#facc15; font-weight:bold; }

.total {
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
  color:#38bdf8;
}
</style>
</head>

<body>

<h2>🔐 Bizlink Cash Book</h2>

<div id="loginBox">
  <button onclick="googleLogin()">Login with Google</button>
</div>

<div id="app" class="hidden">

<button onclick="logout()">Logout</button>

<br><br>

<div id="entryBox">
<input type="date" id="date">
<input type="text" id="particulars" placeholder="Particulars">
<input type="number" id="debit" placeholder="Money Out (Debit)">
<input type="number" id="credit" placeholder="Money In (Credit)">
<button onclick="addEntry()">Add Entry</button>
</div>
<br><br>

<input type="month" id="monthFilter">
<input type="date" id="fromDate">
<input type="date" id="toDate">
<input type="text" id="search" placeholder="Search...">

<button onclick="applyFilter()">Filter</button>
<button onclick="resetFilter()">Reset</button>
<button onclick="downloadCSV()">Download Excel</button>
<table>
<thead>
<tr>
<th>Date</th>
<th>Particulars</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="total" id="totalBalance"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZLwV2xzpIYXyBw15T2OI4j3iLz3uuEwI",
  authDomain: "bizlink-cashbook.firebaseapp.com",
  projectId: "bizlink-cashbook",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let entries = [];
let filteredEntries = [];
  
// 👑 ADMIN EMAIL
const ADMIN_EMAIL = "sahilkhandadar@gmail.com";

// 📅 TODAY FIX
const today = new Date().toISOString().split('T')[0];
const dateInput = document.getElementById('date');
dateInput.value = today;
dateInput.min = today;
dateInput.max = today;

// 🔐 LOGIN
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// 🚪 LOGOUT
function logout() {
  auth.signOut();
}

// 👀 AUTH
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    if (user.email !== ADMIN_EMAIL) {
      document.getElementById("entryBox").style.display = "none";
    }

    loadData();
  } else {
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }
});

// ➕ ADD ENTRY
function addEntry() {
  const date = dateInput.value;
  const particulars = document.getElementById('particulars').value.trim();
  const debit = Number(document.getElementById('debit').value) || 0;
  const credit = Number(document.getElementById('credit').value) || 0;

  if (!particulars) return alert("Enter particulars");
  if (date !== today) return alert("Only today's entry allowed");

  db.collection("cashbook").add({
    userId: currentUser.uid,
    date,
    particulars,
    debit,
    credit,
    createdAt: new Date()
  });

  document.getElementById('particulars').value = '';
  document.getElementById('debit').value = '';
  document.getElementById('credit').value = '';
}

// 🔥 FIXED LOAD DATA (MAIN ISSUE SOLVED)
function loadData() {
  db.collection("cashbook")
    .onSnapshot(snapshot => {
      entries = [];

      snapshot.forEach(doc => {
        const data = doc.data();

        let time = 0;

        // ✅ handle both Timestamp & Date
        if (data.createdAt) {
          if (data.createdAt.seconds) {
            time = data.createdAt.seconds;
          } else {
            time = new Date(data.createdAt).getTime();
          }
        }

        entries.push({
          ...data,
          _time: time
        });
      });

      // ✅ correct order
      entries.sort((a, b) => a._time - b._time);

      renderTable();
    });
}

// 📊 TABLE
function renderTable(data = entries) {
  let balance = 0;
  let totalCredit = 0;
  let totalDebit = 0;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  data.forEach(entry => {
    balance += entry.credit - entry.debit;

    totalCredit += entry.credit;
    totalDebit += entry.debit;

    const debitText = entry.debit ? `<span class="debit">-₹${entry.debit}</span>` : '';
    const creditText = entry.credit ? `<span class="credit">+₹${entry.credit}</span>` : '';

    tbody.innerHTML += `
    <tr>
      <td>${entry.date}</td>
      <td>${entry.particulars}</td>
      <td>${debitText}</td>
      <td>${creditText}</td>
      <td>₹${balance}</td>
    </tr>`;
  });

  // 🔥 FINAL TOTAL DISPLAY
  document.getElementById("totalBalance").innerHTML = `
    Total Credit: ₹${totalCredit} &nbsp;&nbsp; | &nbsp;&nbsp;
    Total Debit: ₹${totalDebit} &nbsp;&nbsp; | &nbsp;&nbsp;
    Remaining Balance: ₹${balance}
  `;
}
function applyFilter() {
  const month = document.getElementById("monthFilter").value;
  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;
  const search = document.getElementById("search").value.toLowerCase();

  filteredEntries = entries.filter(entry => {

    let match = true;

    if (month) {
      match = entry.date.startsWith(month);
    }

    if (from && to) {
      match = entry.date >= from && entry.date <= to;
    }

    if (search) {
      match = entry.particulars.toLowerCase().includes(search);
    }

    return match;
  });

  renderTable(filteredEntries);
}

  function resetFilter() {
  document.getElementById("monthFilter").value = "";
  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";
  document.getElementById("search").value = "";

  renderTable(entries);
}

  function downloadCSV() {
  const data = filteredEntries.length ? filteredEntries : entries;

  let csv = "Date,Particulars,Debit,Credit,Balance\n";

  let balance = 0;

  data.forEach(e => {
    balance += e.credit - e.debit;
    csv += `${e.date},${e.particulars},${e.debit},${e.credit},${balance}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "cashbook.csv";
  a.click();
}
  
</script>

</body>
</html>
