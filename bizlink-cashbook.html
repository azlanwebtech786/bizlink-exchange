<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bizlink Cash Book Pro</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #0f172a;
  color: white;
}
h2 { color: #38bdf8; }

input, button {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

input {
  background: #1e293b;
  color: white;
}

button {
  background: #38bdf8;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #334155;
  padding: 8px;
  text-align: center;
}

th {
  background: #1e293b;
}

.summary {
  margin-top: 10px;
  font-weight: bold;
}
</style>

</head>

<body>

<h2>📖 Bizlink Cash Book Pro</h2>

<input type="date" id="date">
<input type="text" id="particulars" placeholder="Particulars">
<input type="number" id="debit" placeholder="Money In (Debit)">
<input type="number" id="credit" placeholder="Money Out (Credit)">

<button onclick="addEntry()">Add / Update</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Particulars</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="summary" id="summary"></div>

<!-- ✅ Firebase CDN (IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// ✅ TERA FIREBASE CONFIG (Already correct)
const firebaseConfig = {
  apiKey: "AIzaSyAZLwV2xzpIYXyBw15T2OI4j3iLz3uuEwI",
  authDomain: "bizlink-cashbook.firebaseapp.com",
  projectId: "bizlink-cashbook",
  storageBucket: "bizlink-cashbook.firebasestorage.app",
  messagingSenderId: "97954558794",
  appId: "1:97954558794:web:bb8dce824a3865183347b3"
};

// ✅ Initialize
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let entries = [];
let editDocId = null;

// Default date
document.getElementById('date').valueAsDate = new Date();

// ➕ ADD / UPDATE
function addEntry() {
  const date = document.getElementById('date').value;
  const particulars = document.getElementById('particulars').value;
  const debit = Number(document.getElementById('debit').value) || 0;
  const credit = Number(document.getElementById('credit').value) || 0;

  if (!date || !particulars) {
    alert("Fill all fields");
    return;
  }

  if (editDocId) {
    const name = prompt("Enter your name:");
    const remark = prompt("Edit remark:");

    db.collection("cashbook").doc(editDocId).update({
      date, particulars, debit, credit,
      edited: true,
      editedBy: name || "Unknown",
      remark: remark || ""
    });

    editDocId = null;
  } else {
    db.collection("cashbook").add({
      date,
      particulars,
      debit,
      credit,
      createdAt: new Date()
    });
  }

  clearInputs();
}

// ✏️ EDIT
function editEntry(id) {
  const entry = entries.find(e => e.id === id);

  document.getElementById('date').value = entry.date;
  document.getElementById('particulars').value = entry.particulars;
  document.getElementById('debit').value = entry.debit;
  document.getElementById('credit').value = entry.credit;

  editDocId = id;
}

// 🧹 CLEAR
function clearInputs() {
  document.getElementById('particulars').value = '';
  document.getElementById('debit').value = '';
  document.getElementById('credit').value = '';
}

// 🔥 REALTIME DATA
db.collection("cashbook").orderBy("createdAt").onSnapshot(snapshot => {
  entries = [];
  snapshot.forEach(doc => {
    entries.push({ id: doc.id, ...doc.data() });
  });
  renderTable();
});

// 📊 TABLE
function renderTable() {
  let balance = 0;
  let totalDebit = 0;
  let totalCredit = 0;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  entries.forEach(entry => {
    balance += entry.debit - entry.credit;
    totalDebit += entry.debit;
    totalCredit += entry.credit;

    const row = `
    <tr>
      <td>${entry.date}</td>
      <td>
        ${entry.particulars}
        ${entry.edited ? `<br><small style="color:#facc15;">
        Edited by ${entry.editedBy} (${entry.remark})
        </small>` : ""}
      </td>
      <td>₹${entry.debit}</td>
      <td>₹${entry.credit}</td>
      <td>₹${balance}</td>
      <td>
        <button onclick="editEntry('${entry.id}')">Edit</button>
      </td>
    </tr>`;

    tbody.innerHTML += row;
  });

  document.getElementById('summary').innerHTML =
    `Total Debit: ₹${totalDebit} | Total Credit: ₹${totalCredit} | Balance: ₹${balance}`;
}

</script>

</body>
</html>
