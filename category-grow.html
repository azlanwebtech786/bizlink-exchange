<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title id="title">Loading...</title>

  <meta name="description" id="metaDesc">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-6">

  <h1 id="heading" class="text-3xl font-bold mb-6"></h1>

  <div id="list" class="grid md:grid-cols-3 gap-6"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcSrWFZGputQMjk-gGsCcEzFpBPiOmBcI",
  authDomain: "bizlink-new.firebaseapp.com",
  projectId: "bizlink-new"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);

const category = params.get("cat");
const city = params.get("city");

// 🔥 SEO
document.getElementById("title").innerText = `${category} in ${city} | Bizlink`;
document.getElementById("metaDesc").content = `Best ${category} in ${city}. Find top services near you.`;

document.getElementById("heading").innerText = `${category} in ${city}`;

const list = document.getElementById("list");

const snap = await getDocs(collection(db,"businesses"));

let found = [];

// 🔥 FILTER
snap.forEach(doc=>{
  const b = doc.data();
  b.id = doc.id;

  if(
    (category === "All" || b.category?.toLowerCase().includes(category.toLowerCase())) &&
    b.location?.toLowerCase().includes(city.toLowerCase())
  ){
    found.push(b);
  }
});

// 🔥 RESULT BASED SORT
found.sort((a,b)=>{
  const aScore = (a.calls||0) + (a.whatsappClicks||0);
  const bScore = (b.calls||0) + (b.whatsappClicks||0);
  return bScore - aScore;
});


// 🔥 RENDER FUNCTION
function renderCards(data){
  data.forEach(b=>{

    // 🔥 AUTO BADGE
    let badge = "";
    let badgeColor = "";

    if((b.calls||0) > 20){
      badge = "🔥 Trending";
      badgeColor = "bg-red-500";
    }
    else if((b.calls||0) > 10){
      badge = "🚀 High Demand";
      badgeColor = "bg-orange-500";
    }
    else if((b.whatsappClicks||0) > 5){
      badge = "⚡ Active";
      badgeColor = "bg-blue-500";
    }
    else{
      badge = "🟢 New";
      badgeColor = "bg-green-500";
    }

    list.innerHTML += `
      <div onclick='openDetail(${JSON.stringify(b)})'
        class="bg-white rounded-xl shadow overflow-hidden cursor-pointer hover:scale-105 transition">

        <div class="relative">
          <img src="${b.image || 'https://via.placeholder.com/400'}"
            class="h-40 w-full object-cover">

          <div class="absolute top-2 left-2 ${badgeColor} text-white text-xs px-2 py-1 rounded">
            ${badge}
          </div>
        </div>

        <div class="p-4">
          <h3 class="font-bold text-lg">${b.name}</h3>
          <p class="text-sm text-gray-500">${b.location}</p>

          <!-- 🔥 LEAD PROOF -->
          <p class="text-xs text-green-600 mt-2 font-semibold">
            🔥 Last 7 Days: ${b.calls||0} Calls • ${b.whatsappClicks||0} WhatsApp
          </p>

        </div>

      </div>
    `;
  });
}


// 🔥 MAIN LOGIC
if(found.length > 0){

  renderCards(found);

}else{

  list.innerHTML = `
    <p class="mb-4 text-red-500">
      No exact match found. Showing all businesses in ${city}
    </p>
  `;

  let fallback = [];

  snap.forEach(doc=>{
    const b = doc.data();
    b.id = doc.id;

    if(b.location?.toLowerCase().includes(city.toLowerCase())){
      fallback.push(b);
    }
  });

  // 🔥 fallback sorting
  fallback.sort((a,b)=>{
    const aScore = (a.calls||0) + (a.whatsappClicks||0);
    const bScore = (b.calls||0) + (b.whatsappClicks||0);
    return bScore - aScore;
  });

  renderCards(fallback);
}


// 🔥 OPEN DETAIL (SEO SAFE)
window.openDetail = (b)=>{
  const slug = (b.name + " in " + b.location)
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-|-$)/g, "");

  window.location.href = "business-grow.html?slug=" + slug + "&id=" + b.id;
};

</script>
</body>
</html>
