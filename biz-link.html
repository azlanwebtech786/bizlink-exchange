<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:#0f172a;
color:#fff;
}

/* NAVBAR */
.navbar{
display:flex;justify-content:space-between;align-items:center;
padding:15px 30px;background:#111827;
box-shadow:0 5px 20px rgba(0,0,0,0.5)
}

.logo{font-size:24px;font-weight:bold;color:#3b82f6}

.nav-right{display:flex;align-items:center;gap:10px}

#userName{
background:#1e293b;padding:6px 12px;border-radius:20px;font-size:14px
}

button{
padding:8px 15px;border:none;border-radius:8px;cursor:pointer
}

.login{background:#374151;color:#fff}
.add{background:#3b82f6;color:#fff}

/* SEARCH */
.search-box{display:flex;justify-content:center;margin:25px}
.search-box input{
padding:14px;width:350px;border:none;background:#1e293b;color:#fff;
border-radius:10px 0 0 10px
}
.search-box button{
padding:14px;background:#f97316;color:#fff;border-radius:0 10px 10px 0
}

/* HERO */
.hero{display:flex;gap:20px;padding:20px}
.banner{
flex:2;
background:linear-gradient(135deg,#3b82f6,#06b6d4);
padding:50px;border-radius:20px;
animation:fadeIn 1s ease;
}
.side-card{
flex:1;background:#111827;padding:25px;border-radius:20px;
}

/* CATEGORY */
.categories{
display:flex;flex-wrap:wrap;justify-content:center;padding:20px
}
.cat{
width:110px;text-align:center;margin:10px;padding:18px;
background:#1e293b;border-radius:15px;
cursor:pointer;transition:0.3s
}
.cat:hover{transform:translateY(-5px);background:#334155}

/* CARDS */
.cards{display:flex;flex-wrap:wrap;justify-content:center}
.card{
width:260px;margin:12px;background:#111827;border-radius:20px;
overflow:hidden;transition:0.3s
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}
.card img{width:100%;height:160px;object-fit:cover}
.card-body{padding:15px}

/* FORM */
#formBox,#loginBox,#dashboard,#profilePage{
display:none;
padding:20px;background:#111827;margin:20px auto;border-radius:20px;
max-width:450px;
}

input{
width:100%;padding:12px;margin:8px 0;
background:#1e293b;border:none;border-radius:10px;color:#fff
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">Bizlink</div>

<div class="nav-right">
<span id="userName"></span>

<button id="loginBtn" onclick="openLogin()">Login</button>
<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>

<button onclick="openDashboard()">My Business</button>
<button onclick="openProfile()">Profile</button>
<button class="add" onclick="openForm()">Grow Business</button>
</div>
</div>

<div class="search-box">
<input id="searchInput" placeholder="Search services...">
<button onclick="search()">Search</button>
</div>

<div class="hero">
<div class="banner">
<h2>Find Best Services 🚀</h2>
<p>Justdial level experience 💎</p>
</div>
<div class="side-card">
<h3>Grow your business</h3>
<button class="add" onclick="openForm()">Start Now</button>
</div>
</div>

<div class="categories">
<div class="cat" onclick="filterCategory('Restaurants')">🍔 Food</div>
<div class="cat" onclick="filterCategory('Hospitals')">🏥 Hospital</div>
<div class="cat" onclick="filterCategory('Education')">🎓 Education</div>
</div>

<h2 style="margin:20px">Popular Services</h2>
<div class="cards" id="cards"></div>

<!-- FORM -->
<div id="formBox">
<input id="bname" placeholder="Business Name">
<input id="bcat" placeholder="Category">
<input id="bphone" placeholder="Phone">
<input id="baddress" placeholder="Address">
<input type="file" id="bimg">
<button onclick="addBusiness()">Add</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>My Businesses</h2>
<div id="myBiz"></div>
</div>

<!-- PROFILE -->
<div id="profilePage">
<h2>Business Profile</h2>
<div id="profileData"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyDruI4mHLRb-KKNnThDn7Woaj28Kg0THwE",
authDomain:"biz-link9610.firebaseapp.com",
projectId:"biz-link9610"
});

const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let user=null;
let businesses=[];

// LOGIN
window.login=function(){
let email=prompt("Email");
let pass=prompt("Password");

signInWithEmailAndPassword(auth,email,pass)
.catch(()=>createUserWithEmailAndPassword(auth,email,pass));
}

window.logout=function(){signOut(auth)}

onAuthStateChanged(auth,(u)=>{
if(u){
user=u;
userName.innerText=u.email;
loginBtn.style.display="none";
logoutBtn.style.display="inline-block";
}
});

// IMAGE UPLOAD
async function uploadImage(file){
const storageRef=ref(storage,"biz/"+Date.now());
await uploadBytes(storageRef,file);
return await getDownloadURL(storageRef);
}

// ADD BUSINESS
window.addBusiness=async function(){
let file=bimg.files[0];
let img=file?await uploadImage(file):"https://via.placeholder.com/300";

await addDoc(collection(db,"businesses"),{
name:bname.value,
category:bcat.value,
phone:bphone.value,
address:baddress.value,
img,
userId:user.uid,
leads:0
});
alert("Business Added 🚀");
}

// REAL TIME
onSnapshot(collection(db,"businesses"),(snap)=>{
businesses=[];
snap.forEach(d=>businesses.push({...d.data(),id:d.id}));
render(businesses);
});

function render(data){
cards.innerHTML=data.map(b=>`
<div class="card">
<img src="${b.img}">
<div class="card-body">
<h3>${b.name}</h3>
<p>${b.phone}</p>
</div>
</div>`).join("");
}

// DASHBOARD
window.openDashboard=function(){
dashboard.style.display="block";
myBiz.innerHTML=businesses
.filter(b=>b.userId===user.uid)
.map(b=>`
<div class="card">
<img src="${b.img}">
<div class="card-body">
<h3>${b.name}</h3>
<p>Leads: ${b.leads||0}</p>
<button onclick="deleteBiz('${b.id}')">Delete</button>
</div>
</div>`).join("");
}

// PROFILE
window.openProfile=function(){
profilePage.style.display="block";
profileData.innerHTML=`Logged in as ${user.email}`;
}

// DELETE
window.deleteBiz=async(id)=>{
await deleteDoc(doc(db,"businesses",id));
}

</script>

</body>
</html>
