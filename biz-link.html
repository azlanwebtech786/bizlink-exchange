<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bizlink Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{background:#0f172a;color:white}

/* Navbar */
.navbar{display:flex;justify-content:space-between;padding:15px;background:#111827}
.logo{color:#38bdf8;font-size:22px}
button{cursor:pointer}

/* Hero */
.hero{text-align:center;padding:60px;background:linear-gradient(135deg,#1e293b,#020617)}
.hero input{padding:12px;border-radius:6px;border:none}

/* Cards */
#results{display:flex;flex-wrap:wrap;justify-content:center}
.card{
background:#1e293b;margin:15px;padding:15px;width:260px;
border-radius:15px;cursor:pointer;
transition:0.3s
}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;height:150px;object-fit:cover;border-radius:10px}

/* Detail */
#detailPage{display:none;padding:20px}
.detail-box{background:#1e293b;padding:20px;border-radius:15px;margin-top:15px}

/* Review */
.review{background:#020617;padding:10px;margin:5px;border-radius:8px}

/* Gallery */
#gallery img{width:100px;margin:5px;border-radius:8px}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">Bizlink</div>
<button onclick="openForm()">Add Business</button>
</div>

<div class="hero" id="homeSection">
<h1>Find Services Near You</h1>
<input id="searchInput" placeholder="Search...">
<button onclick="search()">Search</button>
<button onclick="nearMe()">Near Me</button>
</div>

<div id="results"></div>

<!-- DETAIL -->
<div id="detailPage">

<button onclick="goBack()">⬅ Back</button>

<div class="detail-box">
<img id="dCover" style="width:100%;height:200px;border-radius:10px">

<h2 id="dName"></h2>
<p id="dCategory"></p>
<p id="dPhone"></p>
<p id="dAddress"></p>
<p id="status"></p>
</div>

<!-- Rating -->
<div class="detail-box">
<h3>Rating</h3>
<div>
<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>
</div>
<p id="ratingText"></p>
</div>

<!-- Gallery -->
<div class="detail-box">
<h3>Gallery</h3>
<div id="gallery"></div>
</div>

<!-- Buttons -->
<div class="detail-box">
<button onclick="callNow()">📞 Call</button>
<button onclick="openWhatsApp()">💬 WhatsApp</button>
<button onclick="shareBusiness()">📤 Share</button>
</div>

<!-- Map -->
<div class="detail-box">
<iframe id="mapFrame" width="100%" height="250"></iframe>
</div>

<!-- Reviews -->
<div class="detail-box">
<input id="reviewText" placeholder="Write review">
<button onclick="addReview()">Submit</button>
<div id="reviewList"></div>
</div>

</div>

<!-- FORM -->
<div id="formBox" style="display:none;padding:20px">
<input id="bname" placeholder="Name"><br><br>
<input id="bcat" placeholder="Category"><br><br>
<input id="bphone" placeholder="Phone"><br><br>
<input id="bimg" placeholder="Cover Image"><br><br>
<input id="bimages" placeholder="Gallery (comma ,)"><br><br>
<input id="baddress" placeholder="Address"><br><br>
<button onclick="addBusiness()">Add</button>
</div>

<script>

let businesses = JSON.parse(localStorage.getItem("biz")) || [];

function save(){localStorage.setItem("biz",JSON.stringify(businesses))}

/* Search */
function search(){
let q=searchInput.value.toLowerCase();
show(q)
}

function show(q){
let out=""
businesses.forEach(b=>{
if(b.name.toLowerCase().includes(q)||b.category.includes(q)){
out+=`
<div class="card" onclick="openDetail('${b.name}')">
<img src="${b.img}">
<h3>${b.name}</h3>
<p>${b.phone}</p>
</div>`
}})
results.innerHTML=out
}

/* Detail */
let current="";

function openDetail(name){
current=name;
let b=businesses.find(x=>x.name===name);

homeSection.style.display="none";
results.style.display="none";
detailPage.style.display="block";

dName.innerText=b.name;
dCategory.innerText=b.category;
dPhone.innerText="📞 "+b.phone;
dAddress.innerText="📍 "+b.address;

dCover.src=b.img;

status.innerHTML=b.open?"🟢 Open":"🔴 Closed";

mapFrame.src="https://www.google.com/maps?q="+encodeURIComponent(b.address)+"&output=embed";

showReviews();
showGallery(b);
}

/* Gallery */
function showGallery(b){
let html="";
(b.images||[]).forEach(img=>{
html+=`<img src="${img}">`
});
gallery.innerHTML=html;
}

/* Rating */
function rate(n){
let b=businesses.find(x=>x.name===current);
b.rating=n;
save();
ratingText.innerText="Rated "+n+" ⭐";
}

/* Reviews */
function addReview(){
let text=reviewText.value.trim();
if(!text) return alert("Write review");

let b=businesses.find(x=>x.name===current);
b.reviews.push(text);
save();

reviewText.value="";
showReviews();
}

function showReviews(){
let b=businesses.find(x=>x.name===current);
let html="";
(b.reviews||[]).forEach(r=>{
html+=`<div class="review">⭐ ${r}</div>`
});
reviewList.innerHTML=html;
}

/* Buttons */
function callNow(){
let b=businesses.find(x=>x.name===current);
alert("Calling "+b.phone);
}

function openWhatsApp(){
let b=businesses.find(x=>x.name===current);
window.open("https://wa.me/91"+b.phone);
}

function shareBusiness(){
let b=businesses.find(x=>x.name===current);
navigator.share({title:b.name,text:"Check this",url:location.href});
}

/* Near me */
function nearMe(){
alert("Nearby feature coming soon 😎");
}

/* Add */
function openForm(){formBox.style.display="block"}

function addBusiness(){
let name=bname.value;
let cat=bcat.value;
let phone=bphone.value;
let img=bimg.value||"https://via.placeholder.com/300";
let images=bimages.value.split(",");
let address=baddress.value;

businesses.push({
name,category:cat,phone,
img,images,address,
open:true,reviews:[]
});

save();
alert("Added!");
}

/* Init */
show("");

</script>

</body>
</html>
