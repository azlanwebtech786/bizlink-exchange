<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{background:#0f172a;color:#fff;font-family:Poppins;margin:0}

/* NAV */
.navbar{display:flex;justify-content:space-between;padding:15px;background:#111827}
.logo{font-size:22px;color:#3b82f6;font-weight:bold}

button{padding:8px 12px;border:none;border-radius:8px;background:#3b82f6;color:#fff;cursor:pointer}

/* SEARCH */
.search-box{text-align:center;margin:20px}
.search-box input{padding:12px;width:300px;border-radius:8px;border:none}

/* CATEGORY */
.categories{display:flex;flex-wrap:wrap;justify-content:center}
.cat{background:#1e293b;margin:8px;padding:10px 15px;border-radius:10px;cursor:pointer}

/* CARDS */
.cards{display:flex;flex-wrap:wrap;justify-content:center}
.card{width:230px;margin:10px;background:#111827;border-radius:15px;overflow:hidden}
.card img{width:100%;height:150px;object-fit:cover}
.card-body{padding:10px}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">Bizlink</div>
<button onclick="openForm()">Add Business</button>
</div>

<div class="search-box">
<input id="searchInput" placeholder="Search...">
<button onclick="search()">Search</button>
</div>

<!-- ALL CATEGORY -->
<div class="categories">

<div class="cat" onclick="filterCategory('Food')">🍔 Food</div>
<div class="cat" onclick="filterCategory('Hotel')">🏨 Hotel</div>
<div class="cat" onclick="filterCategory('Hospital')">🏥 Hospital</div>
<div class="cat" onclick="filterCategory('Education')">🎓 Education</div>
<div class="cat" onclick="filterCategory('Salon')">💇 Salon</div>
<div class="cat" onclick="filterCategory('Gym')">🏋️ Gym</div>
<div class="cat" onclick="filterCategory('Repair')">🛠 Repair</div>
<div class="cat" onclick="filterCategory('Travel')">✈ Travel</div>
<div class="cat" onclick="filterCategory('Car')">🚗 Car</div>
<div class="cat" onclick="filterCategory('Finance')">💰 Finance</div>

</div>

<h2 style="margin:20px">Businesses</h2>

<div class="cards" id="cards"></div>

<!-- FORM -->
<div id="formBox" style="display:none;padding:20px">
<input id="bname" placeholder="Name"><br>
<input id="bcat" placeholder="Category"><br>
<input id="bphone" placeholder="Phone"><br>
<input id="baddress" placeholder="Address"><br>
<input type="file" id="bimg"><br>
<button onclick="addBusiness()">Save</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyDruI4mHLRb-KKNnThDn7Woaj28Kg0THwE",
authDomain:"biz-link9610.firebaseapp.com",
projectId:"biz-link9610"
});

const db=getFirestore(app);
const storage=getStorage(app);

let businesses=[];

/* DEMO + FIREBASE MIX */
onSnapshot(collection(db,"businesses"),(snap)=>{
businesses=[];

snap.forEach(doc=>{
businesses.push(doc.data());
});

/* DEMO DATA (IMPORTANT) */
businesses.push(
{name:"Pizza Hut",category:"Food",phone:"999",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"City Hospital",category:"Hospital",phone:"888",img:"https://images.unsplash.com/photo-1586773860418-d37222d8fce3"},
{name:"Dream Coaching",category:"Education",phone:"777",img:"https://images.unsplash.com/photo-1584697964192-6c0c4f0b1d8c"}
);

render(businesses);
});

/* RENDER */
function render(data){
let html="";
data.forEach(b=>{
html+=`
<div class="card">
<img src="${b.img}">
<div class="card-body">
<h3>${b.name}</h3>
<p>${b.category}</p>
<p>${b.phone}</p>
</div>
</div>`;
});
cards.innerHTML=html;
}

/* SEARCH */
window.search=function(){
let q=searchInput.value.toLowerCase();
render(businesses.filter(b=>b.name.toLowerCase().includes(q)));
}

/* FILTER */
window.filterCategory=function(cat){
render(businesses.filter(b=>b.category===cat));
}

/* IMAGE UPLOAD */
async function uploadImage(file){
const storageRef=ref(storage,"biz/"+Date.now());
await uploadBytes(storageRef,file);
return await getDownloadURL(storageRef);
}

/* ADD BUSINESS */
window.addBusiness=async function(){
let file=bimg.files[0];
let img=file?await uploadImage(file):"https://via.placeholder.com/300";

await addDoc(collection(db,"businesses"),{
name:bname.value,
category:bcat.value,
phone:bphone.value,
address:baddress.value,
img
});

alert("Added 🚀");
}

window.openForm=function(){formBox.style.display="block"}

</script>

</body>
</html>
