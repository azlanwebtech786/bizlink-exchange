<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
/* SAME OLD CSS (UNCHANGED) */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f4f7fb}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#fff;box-shadow:0 5px 20px rgba(0,0,0,0.08)}
.logo{font-size:24px;font-weight:bold;color:#007bff}
.nav-right{display:flex;align-items:center;gap:10px}
#userName{background:#eef3ff;padding:6px 12px;border-radius:20px;font-size:14px}
.nav-right button{padding:8px 15px;border:none;border-radius:8px;cursor:pointer}
.login{background:#eee}
.add{background:#007bff;color:#fff}
.search-box{display:flex;justify-content:center;margin:25px}
.search-box input{padding:14px;width:350px;border:1px solid #ccc;border-radius:10px 0 0 10px}
.search-box button{padding:14px;background:#ff6b00;border:none;color:#fff;border-radius:0 10px 10px 0}
.hero{display:flex;gap:20px;padding:20px}
.banner{flex:2;background:linear-gradient(135deg,#007bff,#00c6ff);color:#fff;padding:50px;border-radius:20px}
.side-card{flex:1;background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08)}
.categories{display:flex;flex-wrap:wrap;justify-content:center;padding:20px}
.cat{width:110px;text-align:center;margin:10px;padding:18px;background:#fff;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.08);cursor:pointer;transition:0.3s}
.cat:hover{transform:translateY(-5px)}
.cards{display:flex;flex-wrap:wrap;justify-content:center}
.card{width:260px;margin:12px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.08);cursor:pointer;transition:0.3s}
.card:hover{transform:scale(1.03)}
.card img{width:100%;height:160px;object-fit:cover}
.card-body{padding:15px}
#detailPage{display:none;padding:20px}
.detail-box{background:#fff;padding:20px;border-radius:15px;margin:10px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
#formBox,#loginBox{display:none;padding:20px;background:#fff;margin:20px;border-radius:15px}
#formBox input{padding:10px;margin:5px;width:220px}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">Bizlink</div>

<div class="nav-right">
<span id="userName"></span>

<button id="loginBtn" class="login" onclick="openLogin()">Login</button>
<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>

<button onclick="openDashboard()">My Business</button> <!-- ADDED -->

<button class="add" onclick="openForm()">Add Business</button>
</div>
</div>

<!-- 🔥 DASHBOARD ADD -->
<div id="dashboard" style="display:none;padding:20px">
<h2>My Businesses</h2>
<div id="myBiz" class="cards"></div>
</div>

<!-- SAME OLD UI BELOW (UNCHANGED) -->
<div class="search-box">
<input id="searchInput" placeholder="Search services...">
<button onclick="search()">Search</button>
</div>

<div class="hero">
<div class="banner">
<h2>Find Best Services 🚀</h2>
<p>Explore top businesses near you</p>
</div>

<div class="side-card">
<h3>Grow Your Business</h3>
<button class="add" onclick="openForm()">Start Now</button>
</div>
</div>

<div class="categories">
<div class="cat" onclick="filterCategory('Restaurants')">🍔 Food</div>
<div class="cat" onclick="filterCategory('Hotels')">🏨 Hotels</div>
<div class="cat" onclick="filterCategory('Beauty')">💄 Beauty</div>
<div class="cat" onclick="filterCategory('Home')">🏠 Home</div>
<div class="cat" onclick="filterCategory('Education')">🎓 Education</div>
<div class="cat" onclick="filterCategory('Cars')">🚗 Cars</div>
<div class="cat" onclick="filterCategory('Hospitals')">🏥 Hospital</div>
</div>

<h2 style="margin:20px">Popular Services</h2>
<div class="cards" id="cards"></div>

<div id="detailPage">
<button onclick="goBack()">⬅ Back</button>
<div class="detail-box">
<h2 id="dName"></h2>
<p id="dCategory"></p>
<p id="dPhone"></p>
<p id="dAddress"></p>
</div>
<div class="detail-box">
<iframe id="mapFrame" width="100%" height="250"></iframe>
</div>
</div>

<div id="formBox">
<input id="bname" placeholder="Name">
<input id="bcat" placeholder="Category">
<input id="bphone" placeholder="Phone">
<input id="baddress" placeholder="Address">
<button onclick="addBusiness()">Add</button>
</div>

<div id="loginBox">
<button onclick="login()">Login / Signup</button>
</div>

<!-- ⚠️ HEAD SAME (NO CHANGE) -->

<!-- ⚠️ FORM ME YE ADD KAR (IMAGE INPUT) -->
<input type="file" id="bimg"> <!-- ✅ ADD -->


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 STEP 2: STORAGE IMPORT */
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyDruI4mHLRb-KKNnThDn7Woaj28Kg0THwE",
authDomain:"biz-link9610.firebaseapp.com",
projectId:"biz-link9610"
});

const auth=getAuth(app);
const db=getFirestore(app);

/* 🔥 STEP 3: STORAGE INIT */
const storage = getStorage(app);

let user=null;

// LOGIN
window.login=function(){
let email=prompt("Email");
let pass=prompt("Password");

signInWithEmailAndPassword(auth,email,pass)
.then(()=>{alert("Login Success");loginBox.style.display="none";})
.catch(()=>{createUserWithEmailAndPassword(auth,email,pass);});
}

// LOGOUT
window.logout=function(){signOut(auth);}

// USER UI
onAuthStateChanged(auth,(u)=>{
if(u){
user=u;
userName.innerText="👤 "+u.email;
loginBtn.style.display="none";
logoutBtn.style.display="inline-block";
}else{
user=null;
userName.innerText="";
loginBtn.style.display="inline-block";
logoutBtn.style.display="none";
}
});

let businesses=[];
let current="";

onSnapshot(collection(db,"businesses"),(snap)=>{
businesses=[];
snap.forEach(d=>{
businesses.push({...d.data(),id:d.id});
});
render(businesses);
});

function render(data){
let html="";
data.forEach(b=>{
html+=`
<div class="card" onclick="openDetail('${b.name}')">
<img src="${b.img}">
<div class="card-body">
<h3>${b.name}</h3>
<p>⭐ ${b.rating} | ${b.phone}</p>
</div>
</div>`;
});
cards.innerHTML=html;
}

window.openDetail=function(name){
current=name;
let b=businesses.find(x=>x.name===name);

detailPage.style.display="block";
cards.style.display="none";

dName.innerText=b.name;
dCategory.innerText=b.category;
dPhone.innerText=b.phone;
dAddress.innerText=b.address;

mapFrame.src="https://www.google.com/maps?q="+b.address+"&output=embed";
}

/* 🔥 STEP 4: IMAGE UPLOAD FUNCTION */
async function uploadImage(file){
const storageRef = ref(storage, "bizImages/" + Date.now() + file.name);
await uploadBytes(storageRef, file);
const url = await getDownloadURL(storageRef);
return url;
}

/* 🔥 STEP 5: ADD BUSINESS UPDATE */
window.addBusiness=async function(){

if(!user){alert("Login first");return;}

let file=document.getElementById("bimg")?.files[0];

let imgURL="https://via.placeholder.com/300";

if(file){
imgURL=await uploadImage(file);
}

await addDoc(collection(db,"businesses"),{
name:bname.value,
category:bcat.value,
phone:bphone.value,
address:baddress.value,
rating:4,
img:imgURL,
userId:user.uid
});

alert("Saved with image 🚀");
}

/* 🔥 DASHBOARD */
window.openDashboard=function(){
if(!user){alert("Login first");return;}

document.querySelector(".hero").style.display="none";
document.querySelector(".categories").style.display="none";
document.querySelector(".cards").style.display="none";

dashboard.style.display="block";

let my=businesses.filter(b=>b.userId===user.uid);

let html="";
my.forEach(b=>{
html+=`
<div class="card">
<img src="${b.img}">
<div class="card-body">
<h3>${b.name}</h3>
<p>${b.phone}</p>
<button onclick="deleteBiz('${b.id}')">Delete</button>
<button onclick="editBiz('${b.id}')">Edit</button>
</div>
</div>`;
});
myBiz.innerHTML=html;
}

/* 🔥 STEP 6: EDIT FUNCTION */
window.editBiz=async function(id){

let name=prompt("New Name");
let phone=prompt("New Phone");

await updateDoc(doc(db,"businesses",id),{
name:name,
phone:phone
});

alert("Updated 🔥");
}

window.deleteBiz=async function(id){
await deleteDoc(doc(db,"businesses",id));
alert("Deleted 🔥");
}

window.search=function(){
let q=searchInput.value.toLowerCase();
render(businesses.filter(b=>b.name.toLowerCase().includes(q)));
}

window.filterCategory=function(cat){
render(businesses.filter(b=>b.category===cat));
}

window.goBack=function(){
detailPage.style.display="none";
dashboard.style.display="none";

document.querySelector(".hero").style.display="flex";
document.querySelector(".categories").style.display="flex";
document.querySelector(".cards").style.display="flex";
}

window.openForm=function(){formBox.style.display="block"}
window.openLogin=function(){loginBox.style.display="block"}

</script>

</body>
</html>
