<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bizlink - Find Best Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:#0f172a;
color:white;
}

/* Navbar */
.navbar{
display:flex;justify-content:space-between;
padding:15px 25px;background:#111827;
}
.logo{font-size:22px;font-weight:bold;color:#38bdf8}
.navbar button{
background:#38bdf8;border:none;padding:8px 15px;border-radius:6px;color:black
}

/* Hero */
.hero{
text-align:center;padding:70px;
background:linear-gradient(135deg,#1e293b,#020617);
}
.hero input{
padding:12px;border-radius:6px;border:none;width:260px
}

/* Cards */
#results{display:flex;flex-wrap:wrap;justify-content:center;padding:20px}
.card{
background:#1e293b;
width:260px;margin:10px;padding:10px;
border-radius:15px;cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.3)
}
.card img{
width:100%;height:150px;object-fit:cover;border-radius:10px
}

/* Detail */
#detailPage{display:none;padding:20px}

.detail-box{
background:#1e293b;
padding:20px;border-radius:15px;margin-top:15px
}

/* Review */
.review{
background:#020617;
padding:10px;margin:5px;border-radius:8px
}

button{cursor:pointer}

/* Map */
iframe{border-radius:10px;border:none}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">Bizlink</div>
<button onclick="openForm()">Add Business</button>
</div>

<div class="hero" id="homeSection">
<h1>Find Services Near You</h1>
<input type="text" id="searchInput" placeholder="Search...">
<button onclick="search()">Search</button>
</div>

<div id="results"></div>

<!-- DETAIL PAGE -->
<div id="detailPage">

<button onclick="goBack()">⬅ Back</button>

<div class="detail-box">

<img id="dCover" style="width:100%;height:200px;object-fit:cover;border-radius:15px">

<div style="display:flex;align-items:center;margin-top:-40px">

<img id="dLogo" style="width:80px;height:80px;border-radius:50%;border:3px solid white;margin-right:10px">

<div>
<h2 id="dName"></h2>
<p id="status"></p>
</div>

</div>

<p id="dCategory"></p>
<p id="dPhone"></p>

</div>

<!-- Buttons -->
<div class="detail-box">
<button onclick="callNow()">📞 Call</button>

<button onclick="openWhatsApp()" style="background:#25D366;margin-left:10px">
💬 WhatsApp
</button>

<button onclick="shareBusiness()" style="margin-left:10px">
📤 Share
</button>
</div>

<!-- Map -->
<div class="detail-box">
<h3>Location</h3>
<iframe id="mapFrame" width="100%" height="250"></iframe>
</div>

<!-- Reviews -->
<div class="detail-box">
<h3>Reviews</h3>

<input id="reviewText" placeholder="Write review">
<button onclick="addReview()">Submit</button>

<div id="reviewList"></div>
</div>

</div>

<!-- Add Business -->
<div id="formBox" style="display:none;padding:20px">
<input id="bname" placeholder="Name"><br><br>
<input id="bcat" placeholder="Category"><br><br>
<input id="bphone" placeholder="Phone"><br><br>
<input id="bimg" placeholder="Cover Image URL"><br><br>
<input id="blogo" placeholder="Logo URL"><br><br>

<button onclick="addBusiness()">Add</button>
</div>

<script>

let businesses = JSON.parse(localStorage.getItem("biz")) || [
{
name:"Dream Ranker Coaching",
category:"coaching",
phone:"9876543210",
img:"https://via.placeholder.com/400",
logo:"https://via.placeholder.com/100",
open:true,
reviews:[]
}
];

function save(){localStorage.setItem("biz",JSON.stringify(businesses))}

/* Search */
function search(){
let q=document.getElementById("searchInput").value.toLowerCase();
show(q)
}

function show(q){
let out=""
businesses.forEach(b=>{
if(b.name.toLowerCase().includes(q)||b.category.includes(q)){
out+=`
<div class="card" onclick="openDetail('${b.name}')">
<img src="${b.img}">
<h3>${b.name}</h3>
<p>${b.phone}</p>
</div>`
}})
document.getElementById("results").innerHTML=out
}

/* Detail */
let current="";

function openDetail(name){
current=name;

let b=businesses.find(x=>x.name===name);

homeSection.style.display="none";
results.style.display="none";
detailPage.style.display="block";

dName.innerText=b.name;
dCategory.innerText=b.category;
dPhone.innerText="📞 "+b.phone;

dCover.src=b.img;
dLogo.src=b.logo || b.img;

/* Open Closed */
status.innerHTML = b.open 
? "<span style='color:lightgreen'>🟢 Open Now</span>"
: "<span style='color:red'>🔴 Closed</span>";

/* Map */
mapFrame.src="https://www.google.com/maps?q="+b.name+"&output=embed";

showReviews();
}

function goBack(){
homeSection.style.display="block";
results.style.display="flex";
detailPage.style.display="none";
}

/* Reviews */
function addReview(){
let text=reviewText.value;
let b=businesses.find(x=>x.name===current);

b.reviews.push(text);
save();

showReviews();
}

function showReviews(){
let b=businesses.find(x=>x.name===current);
let html="";

(b.reviews||[]).forEach(r=>{
html+=`<div class="review">⭐ ${r}</div>`
});

reviewList.innerHTML=html;
}

/* Buttons */
function callNow(){
let b=businesses.find(x=>x.name===current);
alert("Calling "+b.phone);
}

function openWhatsApp(){
let b=businesses.find(x=>x.name===current);
window.open("https://wa.me/91"+b.phone);
}

function shareBusiness(){
let b=businesses.find(x=>x.name===current);

navigator.share({
title:b.name,
text:"Check this business on Bizlink",
url:window.location.href
});
}

/* Add Business */
function openForm(){formBox.style.display="block"}

function addBusiness(){
let name=bname.value;
let cat=bcat.value;
let phone=bphone.value;
let img=bimg.value;
let logo=blogo.value;

businesses.push({
name,category:cat,phone,
img,logo,
open:true,
reviews:[]
});

save();
alert("Added!");
}

/* Initial */
show("");

</script>

</body>
</html>
